<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการรายวิชา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; max-width: 600px; margin: 0 auto; }
    .form-group { margin-bottom: 15px; }
    input { width: 100%; padding: 10px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; margin-top: 5px; }
    button { width: 100%; padding: 12px; border-radius: 8px; border: none; background: #6366f1; color: white; font-weight: bold; cursor: pointer; }
    table { width: 100%; border-collapse: collapse; margin-top: 25px; }
    th, td { padding: 10px; border-bottom: 1px solid #334155; }
    .btn-back { display: inline-block; margin-bottom: 15px; color: #94a3b8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <a href="admin.html" class="btn-back">← กลับ Dashboard</a>
    <h1>จัดการรายวิชา</h1>
    <div class="form-group">
      <label>รหัสวิชา</label><input type="text" id="subCode" placeholder="เช่น CS101">
    </div>
    <div class="form-group">
      <label>ชื่อวิชา</label><input type="text" id="subName" placeholder="เช่น Programming 1">
    </div>
    <button onclick="addSubject()">+ เพิ่มรายวิชา</button>

    <table>
      <thead><tr><th>รหัส</th><th>ชื่อวิชา</th><th>ลบ</th></tr></thead>
      <tbody id="sub-list"></tbody>
    </table>
  </div>

  <script>
    const API_URL = localStorage.getItem('gasApiUrl');
    async function addSubject() {
      const code = document.getElementById('subCode').value;
      const name = document.getElementById('subName').value;
      if(!code || !name) return alert('กรุณากรอกข้อมูลให้ครบ');
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'addSubject', subjectCode: code, subjectName: name })
      });
      location.reload();
    }

    async function loadData() {
      const res = await fetch(`${API_URL}?action=getSubjects`);
      const data = await res.json();
      document.getElementById('sub-list').innerHTML = data.map(s => `
        <tr><td>${s.code}</td><td>${s.name}</td>
        <td><button style="background:red; color:white; border:none; padding:2px 8px; border-radius:4px;" onclick="delSub('${s.code}')">x</button></td></tr>
      `).join('');
    }

    async function delSub(code) {
      if(!confirm('ลบวิชา ' + code + '?')) return;
      await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteSubject', subjectCode: code })
      });
      loadData();
    }
    loadData();
  </script>
</body>
</html>
