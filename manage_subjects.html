<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการรายวิชา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 15px; max-width: 500px; margin: 0 auto; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    input { width: 100%; padding: 12px; margin: 5px 0 15px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
    .btn { background: #10b981; color: white; border: none; padding: 12px; width: 100%; border-radius: 8px; cursor: pointer; font-weight: bold; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .back { display: block; text-align: center; margin-top: 20px; color: #666; text-decoration: none; }
  </style>
</head>
<body>
  <div class="card">
    <h3>เพิ่มรายวิชาใหม่ 📚</h3>
    <input type="text" id="code" placeholder="รหัสวิชา">
    <input type="text" id="name" placeholder="ชื่อวิชา">
    <button class="btn" onclick="addSubject()">บันทึกข้อมูล</button>

    <table id="sub-table"></table>
  </div>
  <a href="index.html" class="back">กลับหน้าหลัก</a>

<script>
  const API = localStorage.getItem('gas_v5');
  window.onload = loadSubjects;

  async function addSubject() {
    const code = document.getElementById('code').value;
    const name = document.getElementById('name').value;
    if(!code || !name) return alert("กรอกข้อมูลให้ครบ");
    
    await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'addSubject', code, name }) });
    location.reload();
  }

  async function loadSubjects() {
    const res = await fetch(`${API}?action=getSubjects`);
    const data = await res.json();
    const table = document.getElementById('sub-table');
    table.innerHTML = "<tr><th>รหัส</th><th>ชื่อวิชา</th></tr>";
    data.forEach(v => {
      table.innerHTML += `<tr><td>${v.code}</td><td>${v.name}</td></tr>`;
    });
  }
</script>
</body>
</html>
