<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard - ระบบสแกนใบหน้า</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --success: #10b981; --danger: #ef4444; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: #e2e8f0;
      padding: 20px;
    }
    .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 30px; }
    .btn-back { color: #94a3b8; text-decoration: none; font-size: 14px; }
    
    /* Tabs */
    .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
    .tab-btn { background: none; border: none; color: #94a3b8; padding: 10px 20px; cursor: pointer; border-radius: 8px; font-weight: 600; }
    .tab-btn.active { background: var(--primary); color: white; }

    .content-section { display: none; animation: fadeIn 0.3s ease; }
    .content-section.active { display: block; }

    /* Tables */
    .table-container { background: var(--card); border-radius: 16px; overflow-x: auto; border: 1px solid #334155; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { text-align: left; padding: 15px; background: rgba(0,0,0,0.2); color: #94a3b8; font-size: 13px; text-transform: uppercase; }
    td { padding: 15px; border-top: 1px solid #334155; font-size: 14px; }
    
    .badge { padding: 4px 8px; border-radius: 6px; font-size: 12px; }
    .badge-subject { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
    .map-link { color: #38bdf8; text-decoration: none; }

    /* Forms */
    .form-box { background: var(--card); padding: 20px; border-radius: 16px; margin-bottom: 20px; border: 1px solid #334155; }
    .input-group { display: flex; gap: 10px; margin-top: 10px; }
    input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #334155; background: #0f172a; color: white; }
    .btn-add { background: var(--success); color: white; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
    .btn-del { background: none; border: none; color: var(--danger); cursor: pointer; font-size: 18px; }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

<div class="header">
  <div>
    <h1>Admin Dashboard</h1>
    <p style="color: #94a3b8; font-size: 14px;">จัดการข้อมูลการเข้าเรียนและรายวิชา</p>
  </div>
  <a href="index.html" class="btn-back">← กลับหน้าหลัก</a>
</div>

<div class="tabs">
  <button class="tab-btn active" onclick="showTab('attendance')">📊 รายงานเข้าเรียน</button>
  <button class="tab-btn" onclick="showTab('subjects')">📚 จัดการวิชา</button>
  <button class="tab-btn" onclick="showTab('students')">🎓 นักศึกษา</button>
</div>

<!-- ส่วนที่ 1: รายงานการเข้าเรียน -->
<div id="attendance" class="content-section active">
  <div class="table-container">
    <table id="attendanceTable">
      <thead>
        <tr>
          <th>ชื่อ-นามสกุล</th>
          <th>วิชา</th>
          <th>วันที่</th>
          <th>เวลา</th>
          <th>พิกัด</th>
        </tr>
      </thead>
      <tbody id="attendanceBody">
        <tr><td colspan="5" style="text-align:center;">⏳ กำลังโหลดข้อมูล...</td></tr>
      </tbody>
    </table>
  </div>
</div>

<!-- ส่วนที่ 2: จัดการรายวิชา -->
<div id="subjects" class="content-section">
  <div class="form-box">
    <h3>เพิ่มรายวิชาใหม่</h3>
    <div class="input-group">
      <input type="text" id="subCode" placeholder="รหัสวิชา (เช่น CS101)">
      <input type="text" id="subName" placeholder="ชื่อวิชา">
      <button class="btn-add" onclick="addSubject()">เพิ่มวิชา</button>
    </div>
  </div>
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>รหัสวิชา</th>
          <th>ชื่อวิชา</th>
          <th style="width: 50px;"></th>
        </tr>
      </thead>
      <tbody id="subjectBody"></tbody>
    </table>
  </div>
</div>

<!-- ส่วนที่ 3: จัดการนักศึกษา -->
<div id="students" class="content-section">
  <div class="table-container">
    <table>
      <thead>
        <tr>
          <th>ชื่อนักศึกษา</th>
          <th>วันที่ลงทะเบียน</th>
          <th style="width: 50px;"></th>
        </tr>
      </thead>
      <tbody id="studentBody"></tbody>
    </table>
  </div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');

  function showTab(tabId) {
    document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    loadData(tabId);
  }

  async function loadData(type) {
    if (!API_URL) return alert('กรุณาตั้งค่า API URL ก่อน');
    
    try {
      if (type === 'attendance') {
        const res = await fetch(`${API_URL}?action=getAttendanceReport`);
        const data = await res.json();
        const body = document.getElementById('attendanceBody');
        body.innerHTML = data.length ? '' : '<tr><td colspan="5" style="text-align:center;">ไม่มีข้อมูลการเข้าเรียน</td></tr>';
        data.forEach(row => {
          body.innerHTML += `
            <tr>
              <td><strong>${row['Name'] || row['ชื่อ-นามสกุล']}</strong></td>
              <td><span class="badge badge-subject">${row['Subject'] || row['วิชา'] || '-'}</span></td>
              <td>${row['Date'] || row['วันที่']}</td>
              <td>${row['Time'] || row['เวลา']}</td>
              <td><a href="${row['Map'] || row['แผนที่']}" target="_blank" class="map-link">📍 ดูแผนที่</a></td>
            </tr>`;
        });
      } 
      else if (type === 'subjects') {
        const res = await fetch(`${API_URL}?action=getSubjects`);
        const data = await res.json();
        const body = document.getElementById('subjectBody');
        body.innerHTML = '';
        data.forEach(s => {
          body.innerHTML += `
            <tr>
              <td>${s.code}</td>
              <td>${s.name}</td>
              <td><button class="btn-del" onclick="deleteItem('deleteSubject', '${s.code}')">🗑️</button></td>
            </tr>`;
        });
      }
      else if (type === 'students') {
        const res = await fetch(`${API_URL}?action=getStudents`);
        const data = await res.json();
        const body = document.getElementById('studentBody');
        body.innerHTML = '';
        data.forEach(s => {
          body.innerHTML += `
            <tr>
              <td>${s.name}</td>
              <td>${new Date(s.regDate).toLocaleDateString('th-TH')}</td>
              <td><button class="btn-del" onclick="deleteItem('deleteStudent', '${s.name}')">🗑️</button></td>
            </tr>`;
        });
      }
    } catch (e) {
      console.error(e);
    }
  }

  async function addSubject() {
    const code = document.getElementById('subCode').value;
    const name = document.getElementById('subName').value;
    if (!code || !name) return alert('กรุณากรอกข้อมูลให้ครบ');
    
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: 'addSubject', subjectCode: code, subjectName: name })
    });
    if ((await res.json()).success) {
      document.getElementById('subCode').value = '';
      document.getElementById('subName').value = '';
      loadData('subjects');
    }
  }

  async function deleteItem(action, id) {
    if (!confirm('ยืนยันการลบข้อมูลนี้?')) return;
    const res = await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({ action: action, [action.includes('Subject') ? 'subjectCode' : 'name']: id })
    });
    loadData(action.includes('Subject') ? 'subjects' : 'students');
  }

  // โหลดข้อมูลหน้าแรกตอนเปิด
  window.onload = () => loadData('attendance');
</script>

</body>
</html>
