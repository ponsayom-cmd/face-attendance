<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Admin Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: var(--text); display: flex; }
    .sidebar { width: 250px; background: var(--card); height: 100vh; position: fixed; padding: 30px 15px; border-right: 1px solid #334155; }
    .main { margin-left: 250px; padding: 40px; width: 100%; }
    .nav-link { padding: 12px 15px; border-radius: 10px; cursor: pointer; color: #94a3b8; margin-bottom: 5px; }
    .nav-link.active { background: var(--primary); color: #fff; }
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; text-align: center; }
    .stat-card p { font-size: 2rem; font-weight: 700; margin-top: 10px; }
    .chart-box { background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; }
    th { text-align: left; padding: 12px; color: var(--primary); border-bottom: 2px solid #334155; }
    td { padding: 12px; border-bottom: 1px solid #334155; font-size: 0.9rem; }
    .btn-del { color: #f87171; background: none; border: none; cursor: pointer; }
    /* PIN Lock */
    #pinScreen { position: fixed; inset: 0; background: #0f172a; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
    .pin-card { background: #1e293b; border: 1px solid #334155; border-radius: 24px; padding: 40px 36px; text-align: center; width: 320px; }
    .pin-card h2 { font-size: 1.4em; margin-bottom: 6px; color: #a5b4fc; }
    .pin-card p  { color: #64748b; font-size: 0.85em; margin-bottom: 24px; }
    .pin-input { width: 100%; padding: 14px; font-size: 24px; letter-spacing: 10px; text-align: center; background: #0f172a; border: 2px solid #334155; border-radius: 12px; color: #f1f5f9; outline: none; margin-bottom: 14px; transition: border-color 0.2s; }
    .pin-input:focus { border-color: #6366f1; }
    .pin-btn { width: 100%; padding: 14px; background: linear-gradient(135deg,#6366f1,#4f46e5); color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 600; font-family: 'Sarabun',sans-serif; cursor: pointer; transition: all 0.25s; }
    .pin-btn:hover { box-shadow: 0 6px 20px rgba(99,102,241,0.4); transform: translateY(-1px); }
    .pin-err { color: #f87171; font-size: 0.85em; min-height: 20px; margin-top: -8px; }
    /* Set PIN button in sidebar */
    .pin-set-btn { margin-top: 10px; padding: 10px 15px; border-radius: 10px; cursor: pointer; color: #94a3b8; font-size: 0.85em; background: none; border: 1px dashed #334155; width: 100%; font-family: 'Sarabun',sans-serif; transition: all 0.2s; }
    .pin-set-btn:hover { color: #f1f5f9; border-color: #6366f1; }
    /* PIN modal */
    .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 998; align-items: center; justify-content: center; }
    .modal-bg.open { display: flex; }
    .modal-box { background: #1e293b; border: 1px solid #334155; border-radius: 20px; padding: 32px 28px; width: 300px; text-align: center; }
    .modal-box h3 { margin-bottom: 16px; color: #a5b4fc; }
    .modal-box input { width:100%; padding:12px; font-size:20px; letter-spacing:8px; text-align:center; background:#0f172a; border:2px solid #334155; border-radius:10px; color:#f1f5f9; outline:none; margin-bottom:10px; }
    .modal-box input:focus { border-color:#6366f1; }
    .modal-row { display:flex; gap:10px; margin-top:6px; }
    .modal-row button { flex:1; padding:11px; border-radius:10px; border:none; font-family:'Sarabun',sans-serif; font-size:14px; font-weight:600; cursor:pointer; }
    .btn-ok  { background:#6366f1; color:#fff; }
    .btn-cancel-sm { background:#334155; color:#94a3b8; }
    @media (max-width: 800px) {
      .sidebar { width: 60px; padding: 15px 5px; }
      .main { margin-left: 60px; padding: 20px; }
      .nav-link span { display: none; }
    }
  </style>
</head>
<body>
  <!-- PIN Lock Screen -->
  <div id="pinScreen">
    <div class="pin-card">
      <h2>🔐 Admin</h2>
      <p>กรอก PIN เพื่อเข้าสู่ระบบผู้ดูแล</p>
      <input class="pin-input" type="password" inputmode="numeric" maxlength="8" id="pinInput" placeholder="••••" onkeydown="if(event.key==='Enter') verifyPin()">
      <div class="pin-err" id="pinErr"></div>
      <br>
      <button class="pin-btn" onclick="verifyPin()">🔓 เข้าสู่ระบบ</button>
    </div>
  </div>

  <!-- Set PIN Modal -->
  <div class="modal-bg" id="setPinModal">
    <div class="modal-box">
      <h3>🔑 ตั้ง Admin PIN</h3>
      <input type="password" inputmode="numeric" maxlength="8" id="newPin1" placeholder="PIN ใหม่">
      <input type="password" inputmode="numeric" maxlength="8" id="newPin2" placeholder="ยืนยัน PIN">
      <div class="pin-err" id="setPinErr"></div>
      <div class="modal-row">
        <button class="btn-cancel-sm" onclick="closeSetPin()">ยกเลิก</button>
        <button class="btn-ok" onclick="savePin()">บันทึก</button>
      </div>
    </div>
  </div>

  <div class="sidebar">
    <h3 style="margin-bottom:30px;">Admin</h3>
    <div class="nav-link active" onclick="showTab('dash')">📊 <span>แดชบอร์ด</span></div>
    <div class="nav-link" onclick="showTab('course')">📚 <span>จัดการวิชา</span></div>
    <div class="nav-link" onclick="showTab('student')">👥 <span>นักศึกษา</span></div>
    <div class="nav-link" style="margin-top:40px; color:#f87171;" onclick="window.location.href='index.html'">🏠 <span>หน้าหลัก</span></div>
    <button class="pin-set-btn" onclick="openSetPin()">🔑 <span>ตั้ง PIN</span></button>
  </div>

  <div class="main">
    <div id="tab-dash">
      <h1 style="margin-bottom:30px;">สถิติการเข้าเรียน</h1>
      <div class="stat-grid">
        <div class="stat-card"><span>นักศึกษา</span><p id="s-total">0</p></div>
        <div class="stat-card"><span>วิชาทั้งหมด</span><p id="c-total">0</p></div>
        <div class="stat-card"><span>เข้าเรียนรวม</span><p id="a-total">0</p></div>
      </div>
      <div class="chart-box">
        <h3>การเข้าเรียนรายวิชา</h3>
        <canvas id="myChart" style="max-height: 350px;"></canvas>
      </div>
    </div>

    <div id="tab-course" style="display:none;">
      <h1>จัดการรายวิชา</h1>
      <div class="chart-box" style="margin-top:20px;">
        <div style="display:flex; gap:10px; margin-bottom:20px;">
          <input type="text" id="cInput" placeholder="ชื่อวิชา..." style="flex:1; padding:10px; border-radius:8px; border:none; background:#0f172a; color:#fff;">
          <button onclick="addCourse()" style="padding:10px 20px; background:var(--primary); color:#fff; border:none; border-radius:8px; cursor:pointer;">+ เพิ่ม</button>
        </div>
        <table id="cTable"><thead><tr><th>วิชา</th><th>จัดการ</th></tr></thead><tbody></tbody></table>
      </div>
    </div>

    <div id="tab-student" style="display:none;">
      <h1>รายชื่อนักศึกษา</h1>
      <table id="sTable"><thead><tr><th>ชื่อ-นามสกุล</th><th>วันที่บันทึก</th><th>จัดการ</th></tr></thead><tbody></tbody></table>
    </div>
  </div>

  <script>
    const API = localStorage.getItem('gasApiUrl');
    let chart;

    // ── PIN Logic ──────────────────────────────────────────────────
    const SESSION_KEY = 'adminPinVerified';

    async function verifyPin() {
      const pin = document.getElementById('pinInput').value.trim();
      if (!pin) { document.getElementById('pinErr').innerText = 'กรุณากรอก PIN'; return; }
      if (!API)  { unlockAdmin(); return; } // ยังไม่ได้ตั้ง API ให้ผ่าน
      try {
        const res = await fetch(API + '?action=verifyAdminPin&pin=' + encodeURIComponent(pin));
        const data = await res.json();
        if (data.success) {
          sessionStorage.setItem(SESSION_KEY, '1');
          unlockAdmin();
        } else {
          document.getElementById('pinErr').innerText = '❌ ' + (data.message || 'PIN ไม่ถูกต้อง');
          document.getElementById('pinInput').value = '';
        }
      } catch(e) {
        // ถ้าเชื่อม API ไม่ได้ให้ผ่าน (fail-open) เพื่อไม่ให้ admin ล็อคตัวเอง
        unlockAdmin();
      }
    }

    function unlockAdmin() {
      document.getElementById('pinScreen').style.display = 'none';
      load();
    }

    function openSetPin()  { document.getElementById('setPinModal').classList.add('open'); }
    function closeSetPin() { document.getElementById('setPinModal').classList.remove('open'); document.getElementById('setPinErr').innerText = ''; }

    async function savePin() {
      const p1 = document.getElementById('newPin1').value.trim();
      const p2 = document.getElementById('newPin2').value.trim();
      const err = document.getElementById('setPinErr');
      if (!p1 || p1.length < 4) { err.innerText = 'PIN ต้องมีอย่างน้อย 4 หลัก'; return; }
      if (p1 !== p2)             { err.innerText = 'PIN ไม่ตรงกัน'; return; }
      if (!API)                  { err.innerText = 'ยังไม่ได้ตั้งค่า API'; return; }
      try {
        const res  = await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'setAdminPin', pin: p1 }) });
        const data = await res.json();
        if (data.success) { alert('✅ ตั้ง PIN เรียบร้อย'); closeSetPin(); document.getElementById('newPin1').value = document.getElementById('newPin2').value = ''; }
        else err.innerText = data.error || 'เกิดข้อผิดพลาด';
      } catch(e) { err.innerText = 'เชื่อมต่อ API ไม่ได้'; }
    }

    // ── ตรวจ session — ถ้าเคย verify แล้วในแท็บนี้ไม่ต้องกรอกซ้ำ ──
    if (sessionStorage.getItem(SESSION_KEY) === '1') {
      document.getElementById('pinScreen').style.display = 'none';
      load();
    }
    // ──────────────────────────────────────────────────────────────

    function showTab(t) {
      ['dash','course','student'].forEach(id => document.getElementById('tab-'+id).style.display = id===t?'block':'none');
      document.querySelectorAll('.nav-link').forEach(l => l.classList.toggle('active', l.innerText.includes(t==='dash'?'แดชบอร์ด':t==='course'?'วิชา':'นักศึกษา')));
    }

    async function load() {
      if(!API) return;
      const res = await fetch(API + '?action=getStats');
      const data = await res.json();
      document.getElementById('s-total').innerText = data.summary.students;
      document.getElementById('c-total').innerText = data.summary.courses;
      document.getElementById('a-total').innerText = data.summary.totalLogs;

      if(chart) chart.destroy();
      chart = new Chart(document.getElementById('myChart'), {
        type: 'bar',
        data: {
          labels: Object.keys(data.courseChart),
          datasets: [{ label: 'จำนวนครั้ง', data: Object.values(data.courseChart), backgroundColor: '#6366f1' }]
        }
      });

      const courses = await (await fetch(API + '?action=getCourses')).json();
      document.querySelector('#cTable tbody').innerHTML = courses.map(c => `<tr><td>${c}</td><td><button class="btn-del" onclick="delCourse('${c}')">ลบ</button></td></tr>`).join('');

      const students = await (await fetch(API + '?action=getStudentList')).json();
      document.querySelector('#sTable tbody').innerHTML = students.map(s => `<tr><td>${s.name}</td><td>${new Date(s.date).toLocaleDateString()}</td><td><button class="btn-del" onclick="delStudent('${s.name}')">ลบ</button></td></tr>`).join('');
    }

    async function addCourse() {
      const v = document.getElementById('cInput').value; if(!v) return;
      await fetch(API, {method:'POST', body:JSON.stringify({action:'addCourse', courseName:v})});
      document.getElementById('cInput').value=''; load();
    }
    async function delCourse(n) { if(confirm('ลบวิชา?')) { await fetch(API,{method:'POST', body:JSON.stringify({action:'deleteCourse', courseName:n})}); load(); } }
    async function delStudent(n) { if(confirm('ลบนักศึกษา?')) { await fetch(API,{method:'POST', body:JSON.stringify({action:'deleteStudent', name:n})}); load(); } }

    window.onload = load;
  </script>
</body>
</html>
