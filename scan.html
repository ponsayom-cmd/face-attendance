<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ระบบเช็คชื่อ - Smart Scan</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    body { background: #0f172a; color: white; margin: 0; font-family: 'Sarabun', sans-serif; text-align: center; overflow: hidden; }
    .viewfinder { width: 100vw; height: 100vw; max-width: 400px; max-height: 400px; margin: 20px auto; position: relative; border-radius: 30px; overflow: hidden; border: 4px solid #334155; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #msg { font-size: 22px; font-weight: bold; margin-top: 20px; min-height: 30px; }
    #status { font-size: 12px; color: #64748b; margin-top: 10px; }
  </style>
</head>
<body>
  <div id="status">⌛ กำลังโหลดโมเดล AI...</div>
  <div class="viewfinder">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>
  <div id="msg">สแกนใบหน้าเพื่อเช็คชื่อ</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const subject = localStorage.getItem('currentSubject');
  let faceMatcher = null;
  let isProcessing = false;

  async function init() {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    // ใช้รุ่นมาตรฐาน (SsdMobilenet) เพื่อความแม่นยำสูงสุดตามหน้าลงทะเบียน
    await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
    await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
    await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
    
    document.getElementById('status').innerText = "⌛ ดึงข้อมูลนักศึกษา...";
    const res = await fetch(`${API_URL}?action=getKnownFaces`);
    const users = await res.json();
    
    if (users.length > 0) {
      const labeled = users.map(u => new faceapi.LabeledFaceDescriptors(u.name, [new Float32Array(u.descriptor)]));
      faceMatcher = new faceapi.FaceMatcher(labeled, 0.55); // ปรับค่ากลางๆ ให้ติดง่ายแต่ไม่มั่ว
    }

    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    video.onplay = () => {
      document.getElementById('status').innerText = "✅ พร้อมใช้งาน (" + subject + ")";
      detect();
    };
  }

  async function detect() {
    if(isProcessing) return requestAnimationFrame(detect);
    
    const displaySize = { width: video.videoWidth, height: video.videoHeight };
    if(canvas.width !== displaySize.width) faceapi.matchDimensions(canvas, displaySize);

    const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (detections.length > 0) {
      const resized = faceapi.resizeResults(detections, displaySize);
      resized.forEach(det => {
        const result = faceMatcher.findBestMatch(det.descriptor);
        
        // วาดกรอบ
        ctx.strokeStyle = result.label === 'unknown' ? 'red' : '#10b981';
        ctx.lineWidth = 5;
        ctx.strokeRect(det.detection.box.x, det.detection.box.y, det.detection.box.width, det.detection.box.height);

        if (result.label !== 'unknown' && result.distance < 0.5) {
          logAttendance(result.label);
        }
      });
    }
    requestAnimationFrame(detect);
  }

  async function logAttendance(name) {
    isProcessing = true;
    document.getElementById('msg').innerText = "🔍 กำลังบันทึก: " + name;
    
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'logAttendance', name: name, subject: subject })
      });
      const data = await res.json();
      document.getElementById('msg').innerText = data.success ? "✅ สำเร็จ: " + name : "⚠️ เช็คชื่อซ้ำ";
      document.getElementById('msg').style.color = data.success ? "#10b981" : "#f59e0b";
    } catch(e) {
      document.getElementById('msg').innerText = "❌ เชื่อมต่อล้มเหลว";
    }

    setTimeout(() => {
      isProcessing = false;
      document.getElementById('msg').innerText = "สแกนใบหน้าเพื่อเช็คชื่อ";
      document.getElementById('msg').style.color = "white";
    }, 4000);
  }

  init();
</script>
</body>
</html>
