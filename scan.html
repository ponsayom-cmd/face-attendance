<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ระบบเช็คชื่อ - Smart Scanner</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #6366f1; --accent: #10b981; --warning: #f59e0b; --bg: #0f172a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
    body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; }
    .container { width: 100%; max-width: 450px; background: #1e293b; padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #334155; margin-bottom: 15px; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; }
    .info { text-align: center; margin-bottom: 10px; }
    .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; font-size: 14px; font-weight: bold; margin-bottom: 10px; }
    .status-ok { background: rgba(16, 185, 129, 0.2); color: var(--accent); }
    .status-wait { background: rgba(245, 158, 11, 0.2); color: var(--warning); }
    .log-box { width: 100%; max-height: 150px; overflow-y: auto; background: #0f172a; border-radius: 10px; padding: 10px; font-size: 13px; margin-top: 10px; }
    .log-item { border-bottom: 1px solid #1e293b; padding: 5px 0; display: flex; justify-content: space-between; }
    .log-item:last-child { border: none; }
    .duplicate { color: var(--warning); font-style: italic; }
  </style>
</head>
<body>

<div class="container">
  <div class="info">
    <h2 id="subjectName">กำลังโหลดวิชา...</h2>
    <div id="status" class="status-badge status-wait">⌛ กำลังโหลดระบบ AI...</div>
  </div>

  <div class="cam-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="result" style="text-align:center; font-weight:bold; font-size:18px; min-height:28px;"></div>
  
  <div class="log-box" id="logBox">
    <div style="color:#94a3b8; margin-bottom:5px;">ประวัติการสแกนล่าสุด:</div>
  </div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const currentSub = localStorage.getItem('currentSubject') || "ทั่วไป";
  let faceMatcher;
  let isProcessing = false;
  let geo = { lat: 0, lng: 0 };

  document.getElementById('subjectName').innerText = "วิชา: " + currentSub;

  async function init() {
    navigator.geolocation.getCurrentPosition(p => { geo.lat = p.coords.latitude; geo.lng = p.coords.longitude; });
    
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);

      const res = await fetch(`${API_URL}?action=getKnownFaces`);
      const knownData = await res.json();
      
      if(knownData.length === 0) {
        document.getElementById('status').innerText = "❌ ยังไม่มีข้อมูลนักศึกษา";
        return;
      }

      const descriptors = knownData.map(d => new faceapi.LabeledFaceDescriptors(d.name, [new Float32Array(d.descriptor)]));
      faceMatcher = new faceapi.FaceMatcher(descriptors, 0.6);

      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      video.onplay = () => {
        document.getElementById('status').innerText = "✅ ระบบพร้อมเช็คชื่อ";
        document.getElementById('status').className = "status-badge status-ok";
        startDetection();
      };
    } catch(e) { console.error(e); }
  }

  async function startDetection() {
    const canvas = document.getElementById('overlay');
    const displaySize = { width: video.videoWidth, height: video.videoHeight };
    faceapi.matchDimensions(canvas, displaySize);

    setInterval(async () => {
      if(isProcessing) return;
      
      const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
      const resized = faceapi.resizeResults(detections, displaySize);
      canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
      
      faceapi.draw.drawDetections(canvas, resized);

      if(detections.length > 0) {
        const bestMatch = faceMatcher.findBestMatch(detections[0].descriptor);
        if(bestMatch.label !== 'unknown' && bestMatch.distance < 0.45) {
          handleAttendance(bestMatch.label);
        }
      }
    }, 1000);
  }

  async function handleAttendance(name) {
    isProcessing = true;
    document.getElementById('result').innerText = "กำลังตรวจสอบ: " + name;
    
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'logAttendance',
          name: name,
          subject: currentSub,
          lat: geo.lat,
          lng: geo.lng
        })
      });
      const data = await res.json();
      
      const logBox = document.getElementById('logBox');
      const time = new Date().toLocaleTimeString();
      const item = document.createElement('div');
      item.className = 'log-item';
      
      if(data.success) {
        document.getElementById('result').innerHTML = `<span style="color:var(--accent)">ยินดีต้อนรับ ${name}!</span>`;
        item.innerHTML = `<span>${name}</span> <span style="color:var(--accent)">เช็คชื่อสำเร็จ (${time})</span>`;
      } else {
        document.getElementById('result').innerHTML = `<span style="color:var(--warning)">${name} เช็คชื่อไปแล้ว</span>`;
        item.innerHTML = `<span>${name}</span> <span class="duplicate">เช็คซ้ำ (${time})</span>`;
      }
      
      logBox.prepend(item);
      
      // หน่วงเวลา 3 วินาทีก่อนรับคนถัดไป
      setTimeout(() => {
        isProcessing = false;
        document.getElementById('result').innerText = "";
      }, 3000);

    } catch(e) {
      isProcessing = false;
    }
  }

  window.onload = init;
</script>
</body>
</html>
