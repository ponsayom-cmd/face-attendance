<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ระบบเช็คชื่อ - Fast Scan</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #4f46e5; --accent: #10b981; --warning: #f59e0b; --bg: #0f172a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
    body { background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; overflow-x: hidden; }
    .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    
    .header { text-align: center; margin-bottom: 15px; }
    #status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; background: #334155; color: #94a3b8; }
    .status-ready { background: rgba(16, 185, 129, 0.2) !important; color: var(--accent) !important; }

    .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 18px; overflow: hidden; position: relative; border: 2px solid #334155; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
    
    #result-msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 18px; }
    .log-container { margin-top: 15px; background: #0f172a; border-radius: 12px; padding: 10px; max-height: 120px; overflow-y: auto; font-size: 13px; }
    .log-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e293b; }
    .log-row:last-child { border: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h3 id="subText">วิชา: กำลังโหลด...</h3>
    <div id="status">⏳ กำลังเตรียมระบบ AI...</div>
  </div>

  <div class="cam-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="result-msg"></div>

  <div class="log-container" id="logList">
    <div style="color:#64748b; font-size:11px; margin-bottom:4px;">ประวัติการสแกน</div>
  </div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const subject = localStorage.getItem('currentSubject') || "ทั่วไป";
  let faceMatcher = null;
  let isScanning = false;
  let lastScannedPerson = "";
  let scanCooldown = false;

  document.getElementById('subText').innerText = "วิชา: " + subject;

  async function startSystem() {
    try {
      // 1. โหลด Models ก่อน (ใช้ตัวที่เล็กกว่า)
      await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
      await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
      await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
      
      document.getElementById('status').innerText = "⏳ กำลังดึงฐานข้อมูล...";

      // 2. ดึงข้อมูลใบหน้า
      const res = await fetch(`${API_URL}?action=getKnownFaces`);
      const users = await res.json();
      
      if (users.length > 0) {
        const labeledDesc = users.map(u => {
          return new faceapi.LabeledFaceDescriptors(u.name, [new Float32Array(u.descriptor)]);
        });
        faceMatcher = new faceapi.FaceMatcher(labeledDesc, 0.6);
      }

      // 3. เปิดกล้อง
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: "user", width: { ideal: 400 }, height: { ideal: 400 } } 
      });
      video.srcObject = stream;
      
      video.onplay = () => {
        document.getElementById('status').innerText = "✅ พร้อมเช็คชื่อ";
        document.getElementById('status').classList.add('status-ready');
        processFrame();
      };

    } catch (err) {
      document.getElementById('status').innerText = "❌ เกิดข้อผิดพลาด";
      console.error(err);
    }
  }

  async function processFrame() {
    if (!faceMatcher || scanCooldown) {
      requestAnimationFrame(processFrame);
      return;
    }

    const canvas = document.getElementById('overlay');
    const displaySize = { width: video.videoWidth, height: video.videoHeight };
    
    if (canvas.width !== displaySize.width) {
      faceapi.matchDimensions(canvas, displaySize);
    }

    const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
    const resized = faceapi.resizeResults(detections, displaySize);
    
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    
    if (detections.length > 0) {
      const result = faceMatcher.findBestMatch(detections[0].descriptor);
      
      // วาดกรอบ
      const box = resized[0].detection.box;
      ctx.strokeStyle = result.label === 'unknown' ? 'red' : '#10b981';
      ctx.lineWidth = 3;
      ctx.strokeRect(box.x, box.y, box.width, box.height);

      if (result.label !== 'unknown' && result.distance < 0.45) {
        if (!isScanning) {
          submitAttendance(result.label);
        }
      }
    }

    // ใช้ความถี่ที่เหมาะสม ไม่ให้ CPU ทำงานหนักเกินไป
    setTimeout(() => requestAnimationFrame(processFrame), 200);
  }

  async function submitAttendance(name) {
    isScanning = true;
    scanCooldown = true;
    const msgBox = document.getElementById('result-msg');
    msgBox.style.color = "white";
    msgBox.innerText = `🔍 กำลังตรวจสอบ: ${name}`;

    try {
      const pos = await new Promise(res => {
        navigator.geolocation.getCurrentPosition(res, () => res({coords:{latitude:0, longitude:0}}), {timeout: 5000});
      });

      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'logAttendance',
          name: name,
          subject: subject,
          lat: pos.coords.latitude,
          lng: pos.coords.longitude
        })
      });

      const data = await response.json();
      addLog(name, data.success);

      if (data.success) {
        msgBox.style.color = "var(--accent)";
        msgBox.innerText = `✅ สำเร็จ: ${name}`;
      } else {
        msgBox.style.color = "var(--warning)";
        msgBox.innerText = `⚠️ ${name} เช็คชื่อไปแล้ว`;
      }
    } catch (e) {
      msgBox.innerText = "❌ การส่งข้อมูลขัดข้อง";
    }

    // หน่วงเวลา 4 วินาทีก่อนรับคนต่อไป เพื่อลดภาระเครื่อง
    setTimeout(() => {
      isScanning = false;
      scanCooldown = false;
      msgBox.innerText = "";
    }, 4000);
  }

  function addLog(name, isSuccess) {
    const list = document.getElementById('logList');
    const time = new Date().toLocaleTimeString('th-TH', { hour: '2-digit', minute: '2-digit' });
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `
      <span>${name}</span>
      <span style="color:${isSuccess ? 'var(--accent)' : 'var(--warning)'}">${isSuccess ? 'สำเร็จ' : 'เช็คซ้ำ'} (${time})</span>
    `;
    list.prepend(row);
  }

  window.onload = startSystem;
</script>
</body>
</html>
