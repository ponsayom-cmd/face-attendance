<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>สแกนเข้าเรียน - เลือกรายวิชา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #10b981; --bg: #0f172a; --card: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      background: var(--bg);
      color: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      min-height: 100vh;
    }
    .container { max-width: 500px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
    .form-group { margin-bottom: 20px; }
    label { display: block; margin-bottom: 8px; color: #94a3b8; font-size: 14px; }
    select {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 16px;
      appearance: none;
    }
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 20px;
      border: 2px solid #334155;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    .scan-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: rgba(0,0,0,0.5);
      z-index: 10;
    }
    .status-badge {
      background: var(--primary);
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
    }
    .btn-start {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: 0.3s;
    }
    .btn-start:disabled { background: #475569; opacity: 0.5; }
    
    /* Modal ยืนยัน */
    .modal {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8);
      display: none; align-items: center; justify-content: center; z-index: 100;
    }
    .modal-content {
      background: var(--card);
      padding: 30px;
      border-radius: 20px;
      text-align: center;
      max-width: 90%;
    }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 14px; display: block; margin-bottom: 15px;">← กลับหน้าหลัก</a>
  <h1>เช็คชื่อเข้าเรียน</h1>
  
  <div class="form-group">
    <label>เลือกวิชาที่เข้าเรียน</label>
    <select id="subjectSelect">
      <option value="">-- กรุณาเลือกวิชา --</option>
    </select>
  </div>

  <div class="video-wrap">
    <video id="video" autoplay muted playsinline></video>
    <div id="overlay" class="scan-overlay">
       <div class="status-badge" id="statusBadge">รอโหลด AI...</div>
    </div>
  </div>

  <button id="btnStart" class="btn-start" disabled>เริ่มการสแกนใบหน้า</button>
</div>

<!-- Modal ยืนยัน -->
<div id="confirmModal" class="modal">
  <div class="modal-content">
    <h2 id="matchName" style="color: var(--primary);">พบข้อมูลนักศึกษา!</h2>
    <p id="matchSubject" style="margin: 10px 0; color: #94a3b8;"></p>
    <p>ต้องการยืนยันการเช็คชื่อหรือไม่?</p>
    <div style="display: flex; gap: 10px; margin-top: 20px;">
      <button id="btnConfirm" style="flex:1; background: var(--primary); padding: 12px; border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">ยืนยัน</button>
      <button id="btnCancel" style="flex:1; background: #ef4444; padding: 12px; border:none; border-radius:10px; color:white; font-weight:bold; cursor:pointer;">ยกเลิก</button>
    </div>
  </div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');
  const btnStart = document.getElementById('btnStart');
  const subjectSelect = document.getElementById('subjectSelect');
  const statusBadge = document.getElementById('statusBadge');
  
  let knownFaces = [];
  let faceMatcher = null;
  let isScanning = false;
  let currentLat = null;
  let currentLng = null;

  async function init() {
    try {
      // 1. โหลด AI
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);

      // 2. ดึงรายชื่อวิชาและใบหน้า
      if (!API_URL) throw new Error('ไม่พบ API URL');
      
      const [subjects, faces] = await Promise.all([
        fetch(`${API_URL}?action=getSubjects`).then(r => r.json()),
        fetch(`${API_URL}?action=getKnownFaces`).then(r => r.json())
      ]);

      // ใส่รายชื่อวิชาใน Select
      subjects.forEach(s => {
        const opt = document.createElement('option');
        opt.value = `${s.code} - ${s.name}`;
        opt.innerText = `${s.code} - ${s.name}`;
        subjectSelect.appendChild(opt);
      });

      // เตรียมตัวเปรียบเทียบใบหน้า
      if (faces.length > 0) {
        knownFaces = faces.map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(knownFaces, 0.5);
      }

      // 3. เปิดกล้อง
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;

      // 4. ขอพิกัด GPS
      navigator.geolocation.getCurrentPosition(p => {
        currentLat = p.coords.latitude;
        currentLng = p.coords.longitude;
      });

      statusBadge.innerText = '✅ ระบบพร้อมทำงาน';
      btnStart.disabled = false;
    } catch (e) {
      statusBadge.innerText = '❌ ผิดพลาด: ' + e.message;
      statusBadge.style.background = '#ef4444';
    }
  }

  btnStart.addEventListener('click', startScan);

  async function startScan() {
    if (!subjectSelect.value) return alert('กรุณาเลือกวิชาก่อนสแกนใบหน้า');
    
    isScanning = true;
    btnStart.disabled = true;
    statusBadge.innerText = '🔍 กำลังค้นหาใบหน้า...';
    document.getElementById('overlay').style.display = 'none';

    const scanLoop = setInterval(async () => {
      if (!isScanning) return clearInterval(scanLoop);

      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      
      if (detection && faceMatcher) {
        const match = faceMatcher.findBestMatch(detection.descriptor);
        if (match.label !== 'unknown') {
          isScanning = false;
          clearInterval(scanLoop);
          showConfirm(match.label);
        }
      }
    }, 1000);
  }

  function showConfirm(name) {
    document.getElementById('matchName').innerText = 'สวัสดี! ' + name;
    document.getElementById('matchSubject').innerText = 'วิชา: ' + subjectSelect.value;
    document.getElementById('confirmModal').style.display = 'flex';

    document.getElementById('btnConfirm').onclick = async () => {
      document.getElementById('btnConfirm').disabled = true;
      document.getElementById('btnConfirm').innerText = 'กำลังบันทึก...';
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({
            action: 'logAttendance',
            name: name,
            subject: subjectSelect.value,
            lat: currentLat,
            lng: currentLng
          })
        });
        const result = await res.json();
        if (result.success) {
          alert('เช็คชื่อสำเร็จ!');
          window.location.href = 'index.html';
        }
      } catch (e) {
        alert('เกิดข้อผิดพลาดในการบันทึก');
      }
    };

    document.getElementById('btnCancel').onclick = () => {
      document.getElementById('confirmModal').style.display = 'none';
      btnStart.disabled = false;
      statusBadge.innerText = '✅ ระบบพร้อมทำงาน';
      document.getElementById('overlay').style.display = 'flex';
    };
  }

  init();
</script>
</body>
</html>
