<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สแกนใบหน้าเข้าเรียน</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #6366f1; --err: #ef4444; --success: #10b981; }
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
    .header { text-align: center; margin-bottom: 20px; }
    .video-container { position: relative; width: 90%; max-width: 400px; border-radius: 30px; overflow: hidden; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.1); border: 5px solid white; }
    video { width: 100%; transform: scaleX(-1); display: block; }
    canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
    .overlay { position: fixed; bottom: 40px; background: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 10px 15px rgba(0,0,0,0.1); font-weight: bold; color: var(--p); z-index: 10; }
    .btn-back { position: fixed; top: 20px; left: 20px; text-decoration: none; color: #64748b; font-size: 14px; background: white; padding: 8px 15px; border-radius: 10px; }
    .loading-screen { position: fixed; inset: 0; background: white; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
    .spinner { border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading" class="loading-screen">
    <div class="spinner"></div>
    <p style="margin-top:15px">กำลังโหลดข้อมูลใบหน้าจากระบบ...</p>
  </div>

  <a href="index.html" class="btn-back">← กลับ</a>

  <div class="header">
    <h3 id="txt-sub">วิชา: ...</h3>
    <div id="status-icon" style="color: var(--success); font-size: 14px;">🟢 ระบบพร้อมสแกน</div>
  </div>

  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div id="msg" class="overlay">กรุณาวางใบหน้าให้ตรงกรอบ</div>

<script>
  const API = localStorage.getItem('gas_v5');
  const subject = localStorage.getItem('currentSubject');
  const video = document.getElementById('video');
  const msg = document.getElementById('msg');
  let faceMatcher = null;
  let isProcessing = false;

  async function init() {
    // แก้ไขการตรวจสอบเงื่อนไขและเปลี่ยนหน้าให้ปลอดภัยขึ้น
    if(!API || API === "" || !subject || subject === "") {
      alert("ไม่พบข้อมูลวิชาหรือ URL กรุณากลับไปตั้งค่าที่หน้าหลัก");
      window.location.replace("index.html");
      return;
    }
    document.getElementById('txt-sub').innerText = `วิชา: ${subject}`;

    try {
      // 1. โหลดโมเดล AI
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);

      // 2. ดึงข้อมูลใบหน้าจาก Sheet
      const res = await fetch(`${API}?action=getKnownFaces&t=${Date.now()}`);
      const knownFaces = await res.json();

      if (!knownFaces || knownFaces.length === 0) {
        alert("ยังไม่มีข้อมูลนักศึกษาในระบบ กรุณาลงทะเบียนก่อน");
        window.location.replace("register.html");
        return;
      }

      // 3. เตรียมการเปรียบเทียบใบหน้า
      const labeledDescriptors = knownFaces
        .filter(f => f.descriptor && f.descriptor.length > 0)
        .map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.descriptor)]));

      if (labeledDescriptors.length === 0) {
        alert("ข้อมูลใบหน้าในระบบไม่สมบูรณ์ (Descriptor ว่าง) กรุณาลงทะเบียนใหม่");
        window.location.replace("index.html");
        return;
      }

      faceMatcher = new faceapi.FaceMatcher(labeledDescriptors, 0.5);

      // 4. เปิดกล้อง
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } });
      video.srcObject = stream;
      
      document.getElementById('loading').style.display = 'none';
      startScan();

    } catch (e) {
      console.error(e);
      alert("เกิดข้อผิดพลาดในการโหลดระบบ: " + e.message);
    }
  }

  async function startScan() {
    if(isProcessing) return;

    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (detection) {
      const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
      
      if (bestMatch.label !== 'unknown') {
        msg.innerText = `✅ พบคุณ ${bestMatch.label}`;
        msg.style.color = "var(--success)";
        logAttendance(bestMatch.label);
      } else {
        msg.innerText = "❌ ไม่พบข้อมูลในระบบ (Unknown)";
        msg.style.color = "var(--err)";
        setTimeout(startScan, 500);
      }
    } else {
      msg.innerText = "กรุณาวางใบหน้าให้ตรงกรอบ";
      msg.style.color = "var(--p)";
      setTimeout(startScan, 500);
    }
  }

  async function logAttendance(name) {
    isProcessing = true;
    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'logAttendance', name, subject })
      });
      const data = await res.json();
      if(data.success) {
        msg.innerText = `เช็คชื่อสำเร็จ: ${name}`;
        setTimeout(() => {
          isProcessing = false;
          startScan();
        }, 3000);
      }
    } catch (e) {
      isProcessing = false;
      startScan();
    }
  }

  window.onload = init;
</script>
</body>
</html>
