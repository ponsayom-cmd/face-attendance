<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ระบบเช็คชื่อ - High Performance</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #4f46e5; --accent: #10b981; --warning: #f59e0b; --bg: #0f172a; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
    body { background: var(--bg); color: white; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .container { width: 100%; max-width: 400px; background: #1e293b; padding: 20px; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
    .header { text-align: center; margin-bottom: 15px; }
    #status { display: inline-block; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-top: 8px; background: #334155; color: #94a3b8; }
    .status-ready { background: rgba(16, 185, 129, 0.2) !important; color: var(--accent) !important; }
    .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 18px; overflow: hidden; position: relative; border: 2px solid #334155; }
    video { width: 100%; height: 100%; object-fit: cover; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    #result-msg { text-align: center; margin-top: 15px; font-weight: bold; min-height: 24px; font-size: 18px; }
    .log-container { margin-top: 15px; background: #0f172a; border-radius: 12px; padding: 10px; max-height: 100px; overflow-y: auto; font-size: 12px; }
    .log-row { display: flex; justify-content: space-between; padding: 4px 0; border-bottom: 1px solid #1e293b; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h3 id="subText">วิชา: กำลังโหลด...</h3>
    <div id="status">⏳ กำลังเตรียมระบบ AI...</div>
  </div>
  <div class="cam-box">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="overlay"></canvas>
  </div>
  <div id="result-msg"></div>
  <div class="log-container" id="logList"></div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const subject = localStorage.getItem('currentSubject') || "ทั่วไป";
  let faceMatcher = null;
  let isChecking = false;

  document.getElementById('subText').innerText = "วิชา: " + subject;

  async function init() {
    try {
      // โหลดเฉพาะโมเดลที่จำเป็นและใช้ Tiny Face Detector แทนเพื่อลดภาระเครื่อง
      await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
      await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
      await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
      
      const res = await fetch(`${API_URL}?action=getKnownFaces`);
      const users = await res.json();
      
      if (users && users.length > 0) {
        const labeledDesc = users.map(u => new faceapi.LabeledFaceDescriptors(u.name, [new Float32Array(u.descriptor)]));
        faceMatcher = new faceapi.FaceMatcher(labeledDesc, 0.6);
      }

      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 400, height: 400 } });
      video.srcObject = stream;
      video.onplay = () => {
        document.getElementById('status').innerText = "✅ พร้อมเช็คชื่อ";
        document.getElementById('status').classList.add('status-ready');
        runDetection();
      };
    } catch (e) {
      document.getElementById('status').innerText = "❌ โหลดระบบไม่สำเร็จ";
    }
  }

  async function runDetection() {
    if (isChecking || !faceMatcher) {
      setTimeout(runDetection, 500); // พัก 0.5 วินาทีถ้ากำลังยุ่ง
      return;
    }

    const canvas = document.getElementById('overlay');
    const displaySize = { width: video.videoWidth, height: video.videoHeight };
    if (canvas.width !== displaySize.width) faceapi.matchDimensions(canvas, displaySize);

    // ตรวจจับใบหน้า
    const detections = await faceapi.detectAllFaces(video).withFaceLandmarks().withFaceDescriptors();
    const resized = faceapi.resizeResults(detections, displaySize);
    
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (detections.length > 0) {
      const bestMatch = faceMatcher.findBestMatch(detections[0].descriptor);
      
      // วาดกรอบแบบง่ายเพื่อประหยัดทรัพยากร
      ctx.strokeStyle = bestMatch.label === 'unknown' ? 'red' : '#10b981';
      ctx.lineWidth = 4;
      const box = resized[0].detection.box;
      ctx.strokeRect(box.x, box.y, box.width, box.height);

      if (bestMatch.label !== 'unknown' && bestMatch.distance < 0.45) {
        submitData(bestMatch.label);
      }
    }
    
    // ตั้งเวลาสแกนครั้งต่อไป (ไม่ให้ถี่เกินไปจนค้าง)
    setTimeout(runDetection, 300);
  }

  async function submitData(name) {
    isChecking = true;
    document.getElementById('result-msg').innerText = "⌛ ตรวจสอบ: " + name;
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'logAttendance',
          name: name,
          subject: subject,
          lat: 0, lng: 0 // ตัด GPS ออกชั่วคราวเพื่อลดความหน่วง
        })
      });
      const result = await response.json();
      
      const msgBox = document.getElementById('result-msg');
      if (result.success) {
        msgBox.style.color = "var(--accent)";
        msgBox.innerText = "✅ สำเร็จ: " + name;
      } else {
        msgBox.style.color = "var(--warning)";
        msgBox.innerText = "⚠️ " + (result.message || "เช็คชื่อไปแล้ว");
      }
      addLog(name, result.success);
    } catch (e) {
      document.getElementById('result-msg').innerText = "❌ เชื่อมต่อล้มเหลว";
    }

    // หยุดรอ 3 วินาทีเพื่อให้คนเดิมเดินออกไปก่อน
    setTimeout(() => { isChecking = false; document.getElementById('result-msg').innerText = ""; }, 3000);
  }

  function addLog(name, ok) {
    const row = document.createElement('div');
    row.className = 'log-row';
    row.innerHTML = `<span>${name}</span><span style="color:${ok?'#10b981':'#f59e0b'}">${ok?'เช็คชื่อแล้ว':'ซ้ำ'}</span>`;
    const list = document.getElementById('logList');
    list.prepend(row);
    if(list.children.length > 5) list.lastChild.remove();
  }

  window.onload = init;
</script>
</body>
</html>
