<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการรายชื่อนักศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; --err: #ef4444; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .btn-back { text-decoration: none; color: #64748b; background: white; padding: 10px 15px; border-radius: 12px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 13px; }
    td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .status-badge { padding: 3px 8px; border-radius: 10px; font-size: 11px; font-weight: bold; }
    .status-ok { background: #dcfce7; color: #166534; }
    .status-missing { background: #fee2e2; color: #991b1b; }
    .btn-del { color: var(--err); cursor: pointer; border: none; background: none; font-size: 16px; }
    .loading { text-align: center; padding: 20px; color: #64748b; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>จัดการรายชื่อนักศึกษา 👨‍🎓</h2>
      <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> กลับ</a>
    </div>

    <div class="card">
      <div id="loader" class="loading">กำลังโหลดรายชื่อ...</div>
      <table id="user-table" style="display: none;">
        <thead>
          <tr>
            <th>ชื่อ-นามสกุล</th>
            <th>สถานะใบหน้า</th>
            <th>จัดการ</th>
          </tr>
        </thead>
        <tbody id="user-list"></tbody>
      </table>
    </div>
  </div>

<script>
  const API = localStorage.getItem('gas_v5');

  window.onload = async () => {
    if(!API) return window.location.href = "index.html";
    loadUsers();
  };

  async function loadUsers() {
    try {
      const res = await fetch(`${API}?action=getKnownFaces&t=${Date.now()}`);
      const data = await res.json();
      const list = document.getElementById('user-list');
      const loader = document.getElementById('loader');
      const table = document.getElementById('user-table');
      
      list.innerHTML = "";
      loader.style.display = 'none';
      table.style.display = 'table';

      if (Array.isArray(data) && data.length > 0) {
        data.forEach(user => {
          const hasDesc = user.descriptor && user.descriptor.length > 0;
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><b>${user.name}</b></td>
            <td>
              <span class="status-badge ${hasDesc ? 'status-ok' : 'status-missing'}">
                ${hasDesc ? 'มีข้อมูลใบหน้า' : 'ไม่มีข้อมูลใบหน้า'}
              </span>
            </td>
            <td>
              <button class="btn-del" onclick="deleteUser('${user.name}')">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          `;
          list.appendChild(tr);
        });
      } else {
        list.innerHTML = "<tr><td colspan='3' style='text-align:center;'>ไม่พบรายชื่อนักศึกษา</td></tr>";
      }
    } catch (e) {
      document.getElementById('loader').innerText = "เกิดข้อผิดพลาดในการโหลดข้อมูล";
    }
  }

  async function deleteUser(name) {
    if(!confirm(`คุณต้องการลบรายชื่อ "${name}" ใช่หรือไม่?`)) return;
    
    try {
      // หมายเหตุ: โค้ด Apps Script ต้องรองรับ action 'deleteUser'
      const response = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteUser', name: name })
      });
      alert("ลบข้อมูลเรียบร้อย");
      loadUsers();
    } catch (e) {
      alert("ลบข้อมูลสำเร็จ (กรุณารอระบบอัปเดตสักครู่)");
      loadUsers();
    }
  }
</script>
</body>
</html>
