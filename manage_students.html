<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการรายชื่อนักศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; --err: #ef4444; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
    .container { max-width: 800px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; min-width: 500px; }
    th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 13px; }
    td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .badge { padding: 3px 8px; border-radius: 8px; background: #e0e7ff; color: #4338ca; font-size: 11px; font-weight: bold; }
    .btn-del { color: #cbd5e1; cursor: pointer; border: none; background: none; transition: 0.2s; }
    .btn-del:hover { color: var(--err); }
  </style>
</head>
<body>
  <div class="container">
    <div style="display:flex; align-items:center; justify-content:space-between; margin-bottom:20px;">
      <h2>รายชื่อนักศึกษา 👨‍🎓</h2>
      <a href="index.html" style="text-decoration:none; color:#64748b; font-size:14px;">← กลับ</a>
    </div>

    <div class="card">
      <table>
        <thead>
          <tr>
            <th>รหัส</th>
            <th>ชื่อ-นามสกุล</th>
            <th>ชั้นปี</th>
            <th>สถานะใบหน้า</th>
            <th>ลบ</th>
          </tr>
        </thead>
        <tbody id="list">
          <tr><td colspan="5" style="text-align:center;">กำลังโหลด...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

<script>
  const API = localStorage.getItem('gas_v5');
  window.onload = async () => {
    if(!API) return location.href = "index.html";
    const res = await fetch(`${API}?action=getKnownFaces&t=${Date.now()}`);
    const data = await res.json();
    const list = document.getElementById('list');
    list.innerHTML = "";
    
    data.forEach(u => {
      const hasFace = u.descriptor && u.descriptor.length > 0;
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><b>${u.id || '-'}</b></td>
        <td>${u.name}</td>
        <td>ปี ${u.year || '-'}</td>
        <td><span class="badge" style="background:${hasFace?'#dcfce7':'#fee2e2'}; color:${hasFace?'#166534':'#991b1b'}">${hasFace?'พร้อม':'ไม่มี'}</span></td>
        <td><button class="btn-del" onclick="del('${u.name}')"><i class="fas fa-trash-alt"></i></button></td>
      `;
      list.appendChild(tr);
    });
  };

  async function del(name) {
    if(!confirm(`ลบ ${name}?`)) return;
    await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'deleteUser', name }) });
    location.reload();
  }
</script>
</body>
</html>
