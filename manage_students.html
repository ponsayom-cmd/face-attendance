<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการรายชื่อนักศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; --err: #ef4444; --success: #10b981; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); padding: 20px; margin: 0; }
    .container { max-width: 600px; margin: 0 auto; }
    .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .btn-back { text-decoration: none; color: #64748b; background: white; padding: 10px 15px; border-radius: 12px; font-size: 14px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.02); }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { text-align: left; padding: 12px; background: #f8fafc; color: #64748b; font-size: 13px; }
    td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 14px; }
    .status-badge { padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: bold; white-space: nowrap; }
    .status-ok { background: #dcfce7; color: #166534; }
    .status-missing { background: #fee2e2; color: #991b1b; }
    .btn-del { color: #94a3b8; cursor: pointer; border: none; background: none; font-size: 16px; transition: 0.2s; }
    .btn-del:hover { color: var(--err); }
    .loading-box { text-align: center; padding: 40px 20px; color: #64748b; }
    .spinner { border: 3px solid #f3f3f3; border-top: 3px solid var(--p); border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; display: inline-block; vertical-align: middle; margin-right: 10px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>จัดการรายชื่อนักศึกษา 👨‍🎓</h2>
      <a href="index.html" class="btn-back"><i class="fas fa-arrow-left"></i> กลับ</a>
    </div>

    <div class="card">
      <div id="loader" class="loading-box">
        <div class="spinner"></div> กำลังดึงข้อมูลจาก Server...
      </div>
      
      <div id="error-msg" style="display:none; color:var(--err); text-align:center; padding: 20px;">
        ⚠️ ไม่สามารถดึงข้อมูลได้ โปรดตรวจสอบ URL ของ API หรือการเชื่อมต่ออินเทอร์เน็ต
      </div>

      <div id="table-container" style="display: none;">
        <table>
          <thead>
            <tr>
              <th>ชื่อ-นามสกุล</th>
              <th>สถานะใบหน้า</th>
              <th style="text-align:right;">จัดการ</th>
            </tr>
          </thead>
          <tbody id="user-list"></tbody>
        </table>
      </div>
    </div>
  </div>

<script>
  // ดึงค่า URL API จาก Local Storage
  const API = localStorage.getItem('gas_v5');

  window.onload = async () => {
    if(!API || API === "") {
      alert("ไม่พบ URL API กรุณากลับไปตั้งค่าที่หน้าแรก");
      window.location.href = "index.html";
      return;
    }
    await loadUsers();
  };

  async function loadUsers() {
    const list = document.getElementById('user-list');
    const loader = document.getElementById('loader');
    const errorBox = document.getElementById('error-msg');
    const container = document.getElementById('table-container');

    loader.style.display = 'block';
    errorBox.style.display = 'none';
    container.style.display = 'none';
    list.innerHTML = "";

    try {
      // เพิ่ม TimeStamp เพื่อป้องกัน Cache และดึงข้อมูลใหม่เสมอ
      const response = await fetch(`${API}?action=getKnownFaces&t=${Date.now()}`);
      
      if (!response.ok) throw new Error('Network response was not ok');
      
      const data = await response.json();
      
      loader.style.display = 'none';
      container.style.display = 'block';

      // ตรวจสอบข้อมูลก่อนแสดงผล
      if (Array.isArray(data) && data.length > 0) {
        data.forEach(user => {
          // ตรวจสอบว่ามีข้อมูล Descriptor หรือไม่
          const hasDesc = user.descriptor && Array.isArray(user.descriptor) && user.descriptor.length > 0;
          
          const tr = document.createElement('tr');
          tr.innerHTML = `
            <td><b>${user.name}</b></td>
            <td>
              <span class="status-badge ${hasDesc ? 'status-ok' : 'status-missing'}">
                <i class="fas ${hasDesc ? 'fa-check-circle' : 'fa-times-circle'}"></i> 
                ${hasDesc ? 'พร้อมสแกน' : 'ยังไม่ลงใบหน้า'}
              </span>
            </td>
            <td style="text-align:right;">
              <button class="btn-del" title="ลบรายชื่อ" onclick="deleteUser('${user.name}')">
                <i class="fas fa-trash-alt"></i>
              </button>
            </td>
          `;
          list.appendChild(tr);
        });
      } else {
        list.innerHTML = "<tr><td colspan='3' style='text-align:center; padding: 30px; color: #94a3b8;'>ยังไม่มีรายชื่อนักศึกษาในระบบ</td></tr>";
      }
    } catch (e) {
      console.error("Fetch Error:", e);
      loader.style.display = 'none';
      errorBox.style.display = 'block';
    }
  }

  async function deleteUser(name) {
    if(!confirm(`คุณต้องการลบรายชื่อ "${name}" ออกจากระบบใช่หรือไม่?\n(ข้อมูลใน Google Sheets จะถูกลบออกด้วย)`)) return;
    
    try {
      // ส่งคำขอแบบ JSON เพื่อความรวดเร็ว
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'deleteUser', name: name })
      });
      
      const result = await res.json();
      if (result.success) {
        alert("ลบข้อมูลสำเร็จ");
        loadUsers();
      } else {
        alert("เกิดข้อผิดพลาด: " + result.message);
      }
    } catch (e) {
      // สำหรับบางเบราว์เซอร์ที่บล็อก CORS ตอน POST แต่ข้อมูลอาจเข้าแล้ว
      alert("ส่งคำขอลบแล้ว กำลังตรวจสอบสถานะใหม่...");
      loadUsers();
    }
  }
</script>
</body>
</html>
