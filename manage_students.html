<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>จัดการรายชื่อ v7.1</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f8fafc; padding: 20px; text-align: center; }
    .card { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 600px; margin: auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #eee; text-align: left; }
    .btn-del { color: red; cursor: pointer; border: none; background: none; font-weight: bold; }
  </style>
</head>
<body>
  <div class="card">
    <h2>รายชื่อนักศึกษา</h2>
    <div id="content">กำลังโหลด...</div>
    <br><a href="index.html">กลับหน้าหลัก</a>
  </div>

<script>
  const API = localStorage.getItem('gas_v5');
  async function loadData() {
    const div = document.getElementById('content');
    try {
      const res = await fetch(`${API}?action=getKnownFaces&t=${Date.now()}`);
      const data = await res.json();
      
      // ตรวจสอบว่า data เป็น Array หรือไม่ (ป้องกัน Error ในรูปของคุณ)
      if (!Array.isArray(data)) {
        div.innerHTML = "<p style='color:red'>รูปแบบข้อมูลไม่ถูกต้อง กรุณาเช็คการ Deploy GAS</p>";
        return;
      }

      if (data.length === 0) {
        div.innerHTML = "ยังไม่มีข้อมูลนักศึกษา";
        return;
      }

      let html = "<table><tr><th>รหัส</th><th>ชื่อ</th><th>จัดการ</th></tr>";
      data.forEach(s => {
        html += `<tr><td>${s.id}</td><td>${s.name}</td><td><button class="btn-del" onclick="del('${s.name}')">ลบ</button></td></tr>`;
      });
      div.innerHTML = html + "</table>";
    } catch (e) {
      div.innerHTML = "Error: " + e.message;
    }
  }

  async function del(name) {
    if(!confirm('ลบใช่ไหม?')) return;
    await fetch(API, { method: 'POST', body: JSON.stringify({ action: 'deleteUser', name }) });
    loadData();
  }
  window.onload = loadData;
</script>
</body>
</html>
