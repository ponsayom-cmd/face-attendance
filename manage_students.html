<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>จัดการนักศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #0f172a; color: white; padding: 20px; }
    .card { background: #1e293b; border-radius: 12px; padding: 20px; max-width: 800px; margin: 0 auto; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th, td { padding: 12px; border-bottom: 1px solid #334155; text-align: left; }
    .btn-del { background: #ef4444; color: white; border: none; padding: 5px 10px; border-radius: 5px; cursor: pointer; }
    .btn-back { display: inline-block; margin-bottom: 15px; color: #94a3b8; text-decoration: none; }
    .error-msg { background: #7f1d1d; color: #fecaca; padding: 15px; border-radius: 8px; margin-bottom: 15px; border: 1px solid #ef4444; }
    .btn-setup { background: #6366f1; color: white; text-decoration: none; padding: 8px 16px; border-radius: 6px; display: inline-block; margin-top: 10px; }
  </style>
</head>
<body>
  <div class="card">
    <a href="admin.html" class="btn-back">← กลับ Dashboard</a>
    <h1>รายชื่อนักศึกษาที่ลงทะเบียน</h1>
    
    <div id="status-area"></div>

    <table id="std-table">
      <thead><tr><th>ชื่อ-นามสกุล</th><th>วันที่ลงทะเบียน</th><th>จัดการ</th></tr></thead>
      <tbody id="std-list">
        <tr><td colspan="3" style="text-align:center">กำลังโหลดข้อมูล...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // ดึงค่า API URL จาก localStorage
    const API_URL = localStorage.getItem('gasApiUrl');
    const statusArea = document.getElementById('status-area');
    const stdList = document.getElementById('std-list');

    async function loadData() {
      // ตรวจสอบว่าได้ตั้งค่า API URL หรือยัง
      if (!API_URL || API_URL === "null") {
        statusArea.innerHTML = `
          <div class="error-msg">
            <strong>⚠️ ไม่พบการตั้งค่า API!</strong><br>
            กรุณาไปที่หน้าตั้งค่าเพื่อกรอก URL ของ Google Apps Script ก่อนใช้งาน
            <br>
            <a href="config.html" class="btn-setup">ไปหน้าตั้งค่า</a>
          </div>
        `;
        stdList.innerHTML = '<tr><td colspan="3" style="text-align:center">กรุณาตั้งค่า API ก่อน</td></tr>';
        return;
      }

      try {
        const res = await fetch(`${API_URL}?action=getStudents`);
        if (!res.ok) throw new Error('Network response was not ok');
        
        const data = await res.json();
        
        if (data.length === 0) {
          stdList.innerHTML = '<tr><td colspan="3" style="text-align:center">ไม่พบข้อมูลนักศึกษา</td></tr>';
          return;
        }

        stdList.innerHTML = data.map(s => `
          <tr>
            <td>${s.name}</td>
            <td>${s.regDate ? new Date(s.regDate).toLocaleDateString('th-TH') : '-'}</td>
            <td><button class="btn-del" onclick="deleteStd('${s.name}')">ลบใบหน้า</button></td>
          </tr>
        `).join('');
      } catch (err) {
        console.error(err);
        statusArea.innerHTML = `<div class="error-msg">❌ เกิดข้อผิดพลาดในการโหลดข้อมูล: ${err.message}</div>`;
        stdList.innerHTML = '<tr><td colspan="3" style="text-align:center">โหลดข้อมูลล้มเหลว</td></tr>';
      }
    }

    async function deleteStd(name) {
      if (!API_URL) return alert('กรุณาตั้งค่า API ก่อน');
      if (!confirm('ยืนยันการลบข้อมูลใบหน้าของ ' + name)) return;
      
      try {
        const res = await fetch(API_URL, {
          method: 'POST',
          body: JSON.stringify({ action: 'deleteStudent', name })
        });
        const result = await res.json();
        if (result.success) {
          alert('ลบข้อมูลเรียบร้อยแล้ว');
          loadData();
        } else {
          alert('เกิดข้อผิดพลาด: ' + (result.error || 'ไม่สามารถลบได้'));
        }
      } catch (err) {
        alert('เชื่อมต่อ API ล้มเหลว: ' + err.message);
      }
    }

    // เรียกใช้งานเมื่อโหลดหน้า
    loadData();
  </script>
</body>
</html>
