<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Smart Attendance System</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <style>
    :root { --primary: #7c9cf8; --secondary: #a5b4fc; --accent: #6ee7b7; --bg: #f8fafc; --card: #ffffff; --text-main: #334155; --text-sub: #64748b; --border: #f1f5f9; }
    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); padding-bottom: 90px; min-height: 100vh; }
    .nav-bottom { position: fixed; bottom: 15px; left: 15px; right: 15px; background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); display: flex; justify-content: space-around; padding: 12px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); border: 1px solid var(--border); z-index: 1000; }
    .nav-item { color: var(--text-sub); text-align: center; font-size: 11px; cursor: pointer; flex: 1; transition: 0.3s; }
    .nav-item.active { color: var(--primary); font-weight: 600; }
    .nav-item i { font-size: 22px; display: block; margin-bottom: 4px; }
    .page { display: none; padding: 25px 20px; max-width: 500px; margin: 0 auto; }
    .page.active { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .card { background: var(--card); border-radius: 24px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--border); box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
    input, select { width: 100%; padding: 14px 18px; border-radius: 16px; background: #fdfdfd; border: 1px solid var(--border); color: var(--text-main); margin-bottom: 15px; outline: none; font-size: 15px; }
    .btn { padding: 16px 24px; border-radius: 18px; border: none; font-weight: 700; cursor: pointer; transition: 0.3s; display: inline-flex; align-items: center; gap: 10px; font-size: 15px; justify-content: center; width: 100%; }
    .btn-primary { background: linear-gradient(135deg, var(--primary), var(--secondary)); color: white; box-shadow: 0 8px 20px rgba(124, 156, 248, 0.3); }
    .data-table { width: 100%; border-collapse: collapse; }
    .data-table td { padding: 12px 10px; font-size: 14px; border-bottom: 1px solid var(--border); }
    .loading-spinner { width: 22px; height: 22px; border: 3px solid rgba(124,156,248,0.2); border-top: 3px solid var(--primary); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 10px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="home" class="page active">
    <div class="header-section"><h1>สวัสดีครับ 👋</h1><p>ระบบเช็คชื่ออัจฉริยะ</p></div>
    <div class="card">
      <label style="font-size:12px;color:var(--text-sub)">เลือกรายวิชาเพื่อเริ่มสแกน</label>
      <select id="subjectSelect"><option value="">-- กำลังโหลด... --</option></select>
      <button class="btn btn-primary" onclick="goToScan()"><i class="fas fa-camera"></i> เปิดกล้องสแกน</button>
    </div>
    <div class="card">
      <label style="font-size:12px;color:var(--text-sub)">Google Script Web App URL</label>
      <input type="text" id="apiUrl" placeholder="วาง URL ที่นี่..." onchange="saveConfig()">
      <div id="apiStatus" style="font-size: 12px; text-align: center;"></div>
    </div>
  </div>

  <div id="users" class="page">
    <div class="header-section"><h1>นักศึกษา</h1><p>รายชื่อที่ลงทะเบียนแล้ว</p></div>
    <div class="card" style="padding: 10px;">
      <table class="data-table"><tbody id="userBody"></tbody></table>
      <div id="userEmpty" style="text-align:center;padding:20px;color:var(--text-sub)">ไม่พบข้อมูลนักศึกษา</div>
    </div>
    <a href="register.html" style="position:fixed;bottom:100px;right:20px;background:var(--accent);color:white;width:56px;height:56px;border-radius:28px;display:flex;align-items:center;justify-content:center;box-shadow:0 10px 20px rgba(0,0,0,0.1);text-decoration:none"><i class="fas fa-plus"></i></a>
  </div>

  <div id="settings" class="page">
    <div class="header-section"><h1>เพิ่มวิชา</h1><p>จัดการรายวิชาในระบบ</p></div>
    <div class="card">
      <input type="text" id="newSubCode" placeholder="รหัสวิชา">
      <input type="text" id="newSubName" placeholder="ชื่อวิชา">
      <button id="addBtn" class="btn btn-primary" style="background: var(--accent);" onclick="addSubject()">บันทึกวิชา</button>
    </div>
    <div class="card" style="padding: 10px;">
      <table class="data-table"><tbody id="subjectBody"></tbody></table>
    </div>
  </div>

  <nav class="nav-bottom">
    <div class="nav-item active" onclick="showPage('home')"><i class="fas fa-home"></i>หน้าหลัก</div>
    <div class="nav-item" onclick="showPage('users')"><i class="fas fa-user-graduate"></i>นักศึกษา</div>
    <div class="nav-item" onclick="showPage('settings')"><i class="fas fa-book"></i>วิชา</div>
  </nav>

<script>
  let API_URL = localStorage.getItem('gasApiUrl') || '';
  
  window.onload = () => {
    document.getElementById('apiUrl').value = API_URL;
    if(API_URL) loadSubjects();
  };

  function showPage(id) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
    if(id === 'users') loadUsers();
    if(id === 'settings' || id === 'home') loadSubjects();
  }

  async function loadSubjects() {
    if(!API_URL) return;
    try {
      const res = await fetch(`${API_URL}?action=getSubjects&t=${Date.now()}`);
      const data = await res.json();
      const select = document.getElementById('subjectSelect');
      const tbody = document.getElementById('subjectBody');
      select.innerHTML = '<option value="">-- เลือกวิชา --</option>';
      tbody.innerHTML = '';
      if(Array.isArray(data) && data.length > 0) {
        data.forEach(s => {
          select.innerHTML += `<option value="${s.name}">${s.code} ${s.name}</option>`;
          tbody.innerHTML += `<tr><td><b>${s.code}</b></td><td>${s.name}</td></tr>`;
        });
        document.getElementById('apiStatus').innerHTML = '<span style="color:#10b981">✅ เชื่อมต่อสำเร็จ</span>';
      } else {
        select.innerHTML = '<option value="">ยังไม่มีวิชา</option>';
      }
    } catch(e) { document.getElementById('apiStatus').innerHTML = '<span style="color:#ef4444">❌ เชื่อมต่อล้มเหลว</span>'; }
  }

  async function loadUsers() {
    if(!API_URL) return;
    const tbody = document.getElementById('userBody');
    const empty = document.getElementById('userEmpty');
    tbody.innerHTML = '<tr><td><div class="loading-spinner"></div></td></tr>';
    try {
      const res = await fetch(`${API_URL}?action=getKnownFaces&t=${Date.now()}`);
      const data = await res.json();
      tbody.innerHTML = '';
      if(Array.isArray(data) && data.length > 0) {
        empty.style.display = 'none';
        data.forEach(u => {
          tbody.innerHTML += `<tr><td><b>${u.name}</b></td><td style="text-align:right;color:#ef4444" onclick="deleteUser('${u.name}')"><i class="fas fa-trash"></i></td></tr>`;
        });
      } else { empty.style.display = 'block'; }
    } catch(e) { tbody.innerHTML = ''; empty.style.display = 'block'; }
  }

  async function addSubject() {
    const code = document.getElementById('newSubCode').value;
    const name = document.getElementById('newSubName').value;
    if(!code || !name) return alert('กรุณากรอกข้อมูลให้ครบ');
    const btn = document.getElementById('addBtn');
    btn.disabled = true;
    try {
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'addSubject', code, name }) });
      const result = await res.json();
      if(result.success) {
        alert('เพิ่มวิชาสำเร็จ');
        document.getElementById('newSubCode').value = '';
        document.getElementById('newSubName').value = '';
        loadSubjects();
      }
    } catch(e) { alert('เกิดข้อผิดพลาด'); }
    btn.disabled = false;
  }

  async function deleteUser(name) {
    if(!confirm('ลบรายชื่อนี้?')) return;
    await fetch(API_URL, { method: 'POST', body: JSON.stringify({ action: 'deleteUser', name }) });
    loadUsers();
  }

  function saveConfig() {
    API_URL = document.getElementById('apiUrl').value.trim();
    localStorage.setItem('gasApiUrl', API_URL);
    loadSubjects();
  }

  function goToScan() {
    const sub = document.getElementById('subjectSelect').value;
    if(!sub) return alert('เลือกวิชาก่อน');
    localStorage.setItem('currentSubject', sub);
    window.location.href = 'scan.html';
  }
</script>
</body>
</html>
