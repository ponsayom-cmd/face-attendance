<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนนักศึกษา v5.7</title>
  <script src="https://cdn.jsdelivr.net/npm/@vladmandic/face-api/dist/face-api.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
    .container { background: white; padding: 25px; border-radius: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; text-align: center; }
    video { width: 100%; border-radius: 20px; background: #000; margin-bottom: 15px; transform: scaleX(-1); border: 4px solid #f1f5f9; }
    input { width: 100%; padding: 14px; margin-bottom: 15px; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-size: 16px; text-align: center; }
    .btn { background: var(--p); color: white; border: none; padding: 16px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 16px; }
    .btn:disabled { background: #cbd5e1; cursor: not-allowed; }
    #status { font-size: 13px; color: #64748b; margin-top: 15px; }
    .nav-link { margin-top: 20px; display: block; color: #94a3b8; text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

  <div class="container">
    <h3>ลงทะเบียนใบหน้า 📸</h3>
    <video id="video" autoplay muted playsinline></video>
    <input type="text" id="name" placeholder="ชื่อ-นามสกุล">
    <button id="btn-reg" class="btn" disabled>รอ AI โหลดสักครู่...</button>
    <div id="status">กำลังเริ่มต้นระบบ...</div>
    <a href="index.html" class="nav-link">กลับหน้าหลัก</a>
  </div>

<script>
  const API = localStorage.getItem('gas_v5');
  const video = document.getElementById('video');
  const btn = document.getElementById('btn-reg');
  const status = document.getElementById('status');
  const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
  let faceDescriptor = null;

  async function init() {
    try {
      status.innerText = "⏳ กำลังโหลด AI...";
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      video.onloadedmetadata = () => {
        status.innerText = "✅ ระบบพร้อม ตรวจจับใบหน้า...";
        detect();
      };
    } catch (e) {
      status.innerText = "❌ ติดปัญหา: " + e.message;
    }
  }

  async function detect() {
    const result = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions()).withFaceLandmarks().withFaceDescriptor();
    if (result) {
      faceDescriptor = Array.from(result.descriptor);
      status.innerText = "✅ ตรวจพบใบหน้าแล้ว กดบันทึกได้";
      btn.disabled = false;
      btn.innerText = "บันทึกข้อมูล";
    } else {
      faceDescriptor = null;
      status.innerText = "🔍 ไม่พบใบหน้า กรุณาจัดตำแหน่ง";
      btn.disabled = true;
      btn.innerText = "กำลังตรวจจับ...";
    }
    setTimeout(detect, 600);
  }

  async function register() {
    const name = document.getElementById('name').value.trim();
    if (!name || !faceDescriptor || !API) return alert("ข้อมูลไม่ครบ");

    btn.disabled = true;
    btn.innerText = "⏳ กำลังส่งข้อมูล...";
    
    // ส่งแบบ URLSearchParams เพื่อเลี่ยงปัญหา CORS ใน Google Apps Script
    const payload = new URLSearchParams();
    payload.append('action', 'registerUser');
    payload.append('name', name);
    payload.append('desc', JSON.stringify(faceDescriptor));

    try {
      // ใช้โหมด no-cors สำหรับการส่ง แต่ Apps Script 5.6+ จะจัดการได้
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerUser', name, desc: faceDescriptor })
      });
      const data = await res.json();
      if(data.success) {
        alert("ลงทะเบียนสำเร็จ!");
        window.location.href = "index.html";
      } else {
        alert("ผิดพลาด: " + data.message);
        btn.disabled = false;
      }
    } catch (e) {
      // กรณี fetch error แต่ข้อมูลอาจจะเข้าแล้ว (เพราะ Redirect ของ GAS)
      alert("ส่งข้อมูลแล้ว กรุณาตรวจสอบใน Google Sheet");
      window.location.href = "index.html";
    }
  }

  btn.onclick = register;
  window.onload = init;
</script>
</body>
</html>
