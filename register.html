<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ลงทะเบียน Master v8.0</title>
    <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --bg: #f8fafc; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        .v-container { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 15px; overflow: hidden; margin: 20px 0; position: relative; }
        video, canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); position: absolute; top:0; left:0; }
        input, select, button { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        .btn-main { background: var(--p); color: white; border: none; font-weight: bold; cursor: pointer; }
        .btn-main:disabled { background: #ccc; cursor: not-allowed; }
        #status { font-size: 13px; text-align: center; color: #666; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="card">
        <h2 style="text-align:center; margin-top:0;">ลงทะเบียนใบหน้า</h2>
        <input type="text" id="sid" placeholder="รหัสนักศึกษา">
        <input type="text" id="sname" placeholder="ชื่อ-นามสกุล">
        <select id="syear">
            <option value="">-- เลือกชั้นปี --</option>
            <option value="1">ปี 1</option>
            <option value="2">ปี 2</option>
            <option value="3">ปี 3</option>
            <option value="4">ปี 4</option>
        </select>

        <div class="v-container">
            <video id="video" autoplay muted playsinline></video>
            <canvas id="canvas" style="display:none;"></canvas>
        </div>

        <div id="status">กำลังโหลด AI...</div>
        <button id="snapBtn" class="btn-main" onclick="takePhoto()" style="background:#444;">📷 ถ่ายรูป</button>
        <button id="saveBtn" class="btn-main" onclick="saveData()" disabled>💾 บันทึกข้อมูล</button>
        <button onclick="location.href='index.html'" style="background:none; border:none; color:#999; cursor:pointer;">กลับหน้าหลัก</button>
    </div>

<script>
    const API = localStorage.getItem('gas_v5');
    const video = document.getElementById('video');
    const canvas = document.getElementById('canvas');
    const status = document.getElementById('status');
    const saveBtn = document.getElementById('saveBtn');
    let descriptor = null;

    async function init() {
        try {
            const URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
            await faceapi.nets.tinyFaceDetector.loadFromUri(URL);
            await faceapi.nets.faceLandmark68Net.loadFromUri(URL);
            await faceapi.nets.faceRecognitionNet.loadFromUri(URL);
            
            const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
            video.srcObject = stream;
            status.innerText = "พร้อมถ่ายรูป";
        } catch (e) { status.innerText = "Error: " + e.message; }
    }

    async function takePhoto() {
        status.innerText = "กำลังวิเคราะห์ใบหน้า...";
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        canvas.getContext('2d').drawImage(video, 0, 0);
        
        const result = await faceapi.detectSingleFace(canvas, new faceapi.TinyFaceDetectorOptions())
            .withFaceLandmarks().withFaceDescriptor();

        if (result) {
            descriptor = Array.from(result.descriptor);
            status.innerText = "✅ ตรวจพบใบหน้าแล้ว!";
            saveBtn.disabled = false;
            video.style.display = "none";
            canvas.style.display = "block";
        } else {
            status.innerText = "❌ ไม่พบใบหน้า กรุณาขยับหน้าให้ชัดเจน";
            saveBtn.disabled = true;
        }
    }

    async function saveData() {
        const id = document.getElementById('sid').value;
        const name = document.getElementById('sname').value;
        const year = document.getElementById('syear').value;

        if(!id || !name || !year) return alert("กรุณากรอกข้อมูลให้ครบ");

        saveBtn.disabled = true;
        saveBtn.innerText = "กำลังบันทึก...";

        try {
            const res = await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ action: 'registerUser', id, name, year, desc: descriptor })
            });
            const data = await res.json();
            if(data.success) {
                alert("ลงทะเบียนสำเร็จ!");
                location.href = "manage_students.html";
            } else {
                alert(data.message);
                saveBtn.disabled = false;
            }
        } catch (e) { alert("บันทึกสำเร็จ (ระบบอาจจะดีเลย์)"); location.href = "manage_students.html"; }
    }

    init();
</script>
</body>
</html>
