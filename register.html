<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนใบหน้า (ป้องกันการลงทะเบียนซ้ำ)</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%);
      color: #e2e8f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
    }
    .container {
      max-width: 500px;
      width: 100%;
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(10px);
      padding: 30px;
      border-radius: 24px;
      border: 1px solid rgba(255, 255, 255, 0.1);
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    }
    .video-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 4/3;
      background: #000;
      border-radius: 16px;
      overflow: hidden;
      margin: 20px 0;
      border: 2px solid #334155;
    }
    video { width: 100%; height: 100%; object-fit: cover; }
    input {
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      border: 1px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 16px;
      margin-bottom: 15px;
    }
    button {
      width: 100%;
      padding: 16px;
      border-radius: 12px;
      border: none;
      background: #6366f1;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }
    button:disabled { background: #475569; cursor: not-allowed; }
    .status-msg { margin-top: 15px; text-align: center; font-size: 14px; min-height: 20px; }
    .error { color: #f87171; }
    .success { color: #34d399; }
    .warning { color: #fbbf24; padding: 10px; background: rgba(251, 191, 36, 0.1); border-radius: 8px; margin-bottom: 10px; }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" style="color: #94a3b8; text-decoration: none; font-size: 14px;">← กลับหน้าหลัก</a>
  <h2 style="margin-top: 10px;">ลงทะเบียนใบหน้า</h2>
  <p style="color: #94a3b8; font-size: 13px;">ระบบจะตรวจสอบว่าใบหน้านี้เคยลงทะเบียนแล้วหรือไม่</p>

  <div class="video-wrap">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <input type="text" id="nameInput" placeholder="กรอกชื่อ-นามสกุล ของคุณ">
  
  <div id="msg" class="status-msg">กำลังโหลด AI...</div>
  
  <button id="btnRegister" disabled>📸 ตรวจสอบและลงทะเบียน</button>
</div>

<script>
  const video = document.getElementById('video');
  const btn = document.getElementById('btnRegister');
  const msg = document.getElementById('msg');
  const nameInput = document.getElementById('nameInput');
  const API_URL = localStorage.getItem('gasApiUrl');

  let knownFaces = [];

  async function init() {
    try {
      // 1. โหลด Model
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);
      
      // 2. โหลดข้อมูลใบหน้าที่มีอยู่แล้วเพื่อป้องกันการซ้ำ
      if(API_URL) {
        msg.innerText = 'กำลังโหลดฐานข้อมูลใบหน้า...';
        const res = await fetch(`${API_URL}?action=getKnownFaces`);
        knownFaces = await res.json();
      }

      // 3. เปิดกล้อง
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      
      msg.innerText = '✅ ระบบพร้อมทำงาน';
      btn.disabled = false;
    } catch (err) {
      msg.innerHTML = `<span class="error">❌ ผิดพลาด: ${err.message}</span>`;
    }
  }

  btn.addEventListener('click', async () => {
    const name = nameInput.value.trim();
    if (!name) return alert('กรุณากรอกชื่อของคุณ');
    if (!API_URL) return alert('กรุณาตั้งค่า API URL ก่อน');

    btn.disabled = true;
    btn.innerText = '⏳ กำลังตรวจสอบใบหน้า...';
    msg.innerText = '';

    // สแกนใบหน้าปัจจุบัน
    const detection = await faceapi.detectSingleFace(video)
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (!detection) {
      msg.innerHTML = '<span class="error">❌ ไม่พบใบหน้า! กรุณาจัดตำแหน่งหน้าให้ตรงกล้อง</span>';
      btn.disabled = false;
      btn.innerText = '📸 ตรวจสอบและลงทะเบียน';
      return;
    }

    // ตรวจสอบกับฐานข้อมูล (Duplicate Check)
    if (knownFaces.length > 0) {
      const faceMatcher = new faceapi.FaceMatcher(
        knownFaces.map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.descriptor)]))
      );
      
      const bestMatch = faceMatcher.findBestMatch(detection.descriptor);
      
      // ถ้าค่า distance น้อยกว่า 0.45 (ยิ่งน้อยยิ่งเหมือนมาก) แสดงว่าซ้ำ
      if (bestMatch.label !== 'unknown' && bestMatch.distance < 0.45) {
        msg.innerHTML = `
          <div class="warning">
            ⚠️ <strong>พบข้อมูลซ้ำ!</strong><br>
            ใบหน้านี้ถูกลงทะเบียนไว้แล้วในชื่อ: <strong>${bestMatch.label}</strong>
          </div>
        `;
        btn.disabled = false;
        btn.innerText = '📸 ตรวจสอบและลงทะเบียน';
        return;
      }
    }

    // ถ้าไม่ซ้ำ ให้ส่งไปบันทึก
    try {
      msg.innerText = 'กำลังบันทึกข้อมูล...';
      const descriptorArray = Array.from(detection.descriptor);
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ 
          action: 'registerUser', 
          name: name, 
          faceDescriptor: descriptorArray 
        })
      });
      const result = await res.json();
      
      if (result.success) {
        msg.innerHTML = '<span class="success">✅ ลงทะเบียนสำเร็จ! กำลังกลับหน้าหลัก...</span>';
        setTimeout(() => window.location.href = 'index.html', 2000);
      } else {
        throw new Error(result.error || 'บันทึกไม่สำเร็จ');
      }
    } catch (err) {
      msg.innerHTML = `<span class="error">❌ เกิดข้อผิดพลาด: ${err.message}</span>`;
      btn.disabled = false;
      btn.innerText = '📸 ตรวจสอบและลงทะเบียน';
    }
  });

  init();
</script>
</body>
</html>
