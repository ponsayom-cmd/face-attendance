<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="js/api-config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; min-height: 100vh; background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 50%, #0d1b2a 100%); color: #e2e8f0; display: flex; flex-direction: column; align-items: center; padding: 28px 16px 60px; position: relative; }
    body::before { content: ''; position: fixed; width: 400px; height: 400px; background: #6366f1; border-radius: 50%; filter: blur(100px); opacity: 0.12; top: -80px; left: -80px; pointer-events: none; z-index: 0; }
    .container { width: 100%; max-width: 520px; position: relative; z-index: 1; animation: fadeIn 0.5s ease; }
    .page-header { text-align: center; margin-bottom: 20px; }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: #64748b; text-decoration: none; font-size: 0.88em; padding: 6px 12px; border-radius: 20px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); transition: all 0.25s ease; margin-bottom: 16px; }
    .back-btn:hover { color: #e2e8f0; background: rgba(255,255,255,0.1); }
    h2 { font-size: 1.6em; font-weight: 700; background: linear-gradient(135deg, #a5b4fc, #e2e8f0); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 4px; }
    .instruction { font-size: 0.83em; color: #64748b; line-height: 1.6; }
    .step-dots { display: flex; justify-content: center; gap: 10px; margin: 16px 0 20px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.2); transition: all 0.3s ease; }
    .dot.active { background: #6366f1; box-shadow: 0 0 10px rgba(99,102,241,0.6); }
    #status { font-size: 0.88em; color: #64748b; margin-bottom: 14px; min-height: 20px; display: flex; align-items: center; justify-content: center; gap: 6px; }
    .spinner { display: inline-block; width: 14px; height: 14px; border: 2px solid rgba(99,102,241,0.3); border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; }
    .video-wrapper { position: relative; border-radius: 20px; overflow: hidden; border: 2px solid rgba(99,102,241,0.4); box-shadow: 0 0 30px rgba(99,102,241,0.2), inset 0 0 30px rgba(0,0,0,0.3); background: #0a0a1a; width: 100%; max-width: 480px; margin: 0 auto; }
    video { width: 100%; display: block; transform: scaleX(-1); border-radius: 18px; }
    .form-section { margin-top: 22px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 18px; padding: 22px 20px; backdrop-filter: blur(12px); }
    .input-group { margin-bottom: 14px; }
    .input-group input, .input-group select { width: 100%; padding: 13px 16px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.15); border-radius: 12px; color: #e2e8f0; font-size: 15px; font-family: 'Sarabun', sans-serif; outline: none; transition: all 0.3s ease; }
    .input-group input::placeholder { color: #475569; }
    .input-group select option { background: #1e1e3f; color: #e2e8f0; }
    .input-group input:focus, .input-group select:focus { border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.06); box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
    .input-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
    .input-label { font-size: 0.8em; color: #94a3b8; font-weight: 600; margin-bottom: 5px; display: block; letter-spacing: 0.03em; }
    .id-check-msg { font-size: 0.78em; min-height: 18px; display: block; margin-top: 4px; transition: all 0.2s; }
    #btnSave { width: 100%; padding: 15px; background: linear-gradient(135deg, #6366f1, #4f46e5); color: white; border: none; border-radius: 50px; font-size: 16px; font-weight: 600; font-family: 'Sarabun', sans-serif; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all 0.3s ease; box-shadow: 0 4px 20px rgba(99,102,241,0.3); }
    #btnSave:hover:not(:disabled) { transform: translateY(-2px); box-shadow: 0 8px 30px rgba(99,102,241,0.5); }
    #btnSave:disabled { background: rgba(255,255,255,0.1); color: #475569; box-shadow: none; cursor: default; }
    .count-badge { background: rgba(255,255,255,0.2); padding: 2px 10px; border-radius: 20px; font-size: 13px; }
    #msg { margin-top: 14px; min-height: 24px; font-size: 0.9em; font-weight: 600; text-align: center; line-height: 1.5; }
    .msg-success { color: #34d399; }
    .msg-error   { color: #f87171; }
    .msg-warn    { color: #fbbf24; }
    .msg-info    { color: #94a3b8; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes spin   { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="container">
  <div class="page-header">
    <a href="index.html" class="back-btn">← กลับ</a>
    <h2>👤 ลงทะเบียนนักเรียน</h2>
    <p class="instruction">กรอกข้อมูลแล้วบันทึก 3 มุม: หน้าตรง / หันซ้าย / หันขวา</p>
  </div>

  <div class="step-dots">
    <div class="dot" id="dot1"></div>
    <div class="dot" id="dot2"></div>
    <div class="dot" id="dot3"></div>
  </div>

  <div id="status"><span class="spinner"></span> กำลังโหลด AI Model...</div>

  <div class="video-wrapper">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="form-section">
    <div class="input-row">
      <div class="input-group">
        <span class="input-label">รหัสนักศึกษา</span>
        <input type="text" id="studentId" placeholder="เช่น 6501234567" oninput="onStudentIdInput(this.value)">
        <span class="id-check-msg" id="idCheckMsg"></span>
      </div>
      <div class="input-group">
        <span class="input-label">ชื่อ-นามสกุล</span>
        <input type="text" id="username" placeholder="ชื่อ นามสกุล">
      </div>
    </div>
    <div class="input-group">
      <span class="input-label">วิชา/ชั้นเรียน</span>
      <select id="course">
        <option value="">-- กำลังโหลดวิชา --</option>
      </select>
    </div>
    <button id="btnSave" onclick="saveFace()" disabled>
      📸 บันทึกใบหน้า <span id="saveCount" class="count-badge">0/3</span>
    </button>
    <div id="msg"></div>
  </div>
</div>

<script>
  // ── Service Worker — cache face-api models ─────────────────
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  }
  // ──────────────────────────────────────────────────────────

  // ── GAS Helpers ────────────────────────────────────────────────
  async function gasGet(url) {
    const res  = await fetch(url, { redirect: 'follow' });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch(e) { throw new Error('GAS ตอบกลับไม่ใช่ JSON: ' + text.substring(0, 150)); }
  }
  async function gasPost(url, body) {
    const res  = await fetch(url, {
      method:  'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body:    JSON.stringify(body),
      redirect: 'follow'
    });
    const text = await res.text();
    try { return JSON.parse(text); }
    catch(e) { throw new Error('GAS ตอบกลับไม่ใช่ JSON: ' + text.substring(0, 150)); }
  }
  // ──────────────────────────────────────────────────────────────

  const API_URL   = localStorage.getItem('gasApiUrl') || (typeof GAS_API_URL !== 'undefined' ? GAS_API_URL : '');
  const video     = document.getElementById('video');
  const statusDiv = document.getElementById('status');
  const btnSave   = document.getElementById('btnSave');
  const msgDiv    = document.getElementById('msg');
  const idCheckEl = document.getElementById('idCheckMsg');

  let saveCounter     = 0;       // บันทึกไปกี่มุมแล้ว
  let idBlocked       = false;   // true = รหัสนักศึกษาซ้ำ ห้ามบันทึก
  let idCheckTimer    = null;
  let modelReady      = false;

  // ── Init ───────────────────────────────────────────────────────
  if (!API_URL) {
    statusDiv.innerHTML = '<span style="color:#f87171">❌ ยังไม่ได้ตั้งค่า API URL — <a href="config.html" style="color:#fbbf24">ไปตั้งค่า</a></span>';
  } else {
    loadCourses();
    window.addEventListener('load', initModels);
  }

  // ── Step dots ──────────────────────────────────────────────────
  function updateDots() {
    [1, 2, 3].forEach(i => {
      document.getElementById('dot' + i).className = 'dot' + (i <= saveCounter ? ' active' : '');
    });
  }

  // ── Load courses ───────────────────────────────────────────────
  async function loadCourses() {
    try {
      const courses = await gasGet(API_URL + '?action=getCourses');
      const sel = document.getElementById('course');
      sel.innerHTML = '<option value="">-- เลือกวิชา --</option>';
      courses.forEach(c => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = c;
        sel.appendChild(opt);
      });
    } catch(e) {
      document.getElementById('course').innerHTML = '<option value="">-- โหลดวิชาไม่ได้ --</option>';
    }
  }

  // ── Load AI models ─────────────────────────────────────────────
  async function initModels() {
    try {
      const MODEL_URL = 'https://justadudewhohacks.github.io/face-api.js/models';
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      modelReady = true;
      startCamera();
    } catch(e) {
      statusDiv.innerHTML = '<span style="color:#f87171">❌ โหลด AI Model ล้มเหลว: ' + e.message + '</span>';
    }
  }

  function startCamera() {
    navigator.mediaDevices.getUserMedia({ video: { facingMode: 'user' } })
      .then(stream => {
        video.srcObject = stream;
        statusDiv.innerText = '✅ พร้อมบันทึกใบหน้า';
        btnSave.disabled = false;
      })
      .catch(err => {
        statusDiv.innerHTML = '<span style="color:#f87171">❌ เปิดกล้องไม่ได้: ' + err.message + '</span>';
      });
  }

  // ── ตรวจรหัสนักศึกษาซ้ำแบบ real-time (debounce 600ms) ────────
  function onStudentIdInput(val) {
    idBlocked = false;
    idCheckEl.style.color = '';
    idCheckEl.innerText   = '';
    clearTimeout(idCheckTimer);

    if (!val || val.length < 4) return;

    idCheckTimer = setTimeout(async () => {
      idCheckEl.style.color = '#94a3b8';
      idCheckEl.innerText   = '⏳ กำลังตรวจสอบรหัส...';
      try {
        const data = await gasGet(API_URL + '?action=checkStudentId&studentId=' + encodeURIComponent(val));
        if (data.isDuplicate) {
          idBlocked             = true;
          idCheckEl.style.color = '#f87171';
          idCheckEl.innerText   = '❌ รหัสนี้ลงทะเบียนแล้ว (' + data.name + ' — ' + data.course + ')';
        } else {
          idCheckEl.style.color = '#34d399';
          idCheckEl.innerText   = '✅ รหัสนี้ยังไม่เคยลงทะเบียน';
        }
      } catch(e) {
        idCheckEl.style.color = '#94a3b8';
        idCheckEl.innerText   = '';
      }
    }, 600);
  }

  // ── บันทึกใบหน้า ───────────────────────────────────────────────
  async function saveFace() {
    const studentId = document.getElementById('studentId').value.trim();
    const name      = document.getElementById('username').value.trim();
    const course    = document.getElementById('course').value;

    // ── Validate inputs ──
    if (!studentId) { alert('กรุณากรอกรหัสนักศึกษา'); return; }
    if (!name)      { alert('กรุณากรอกชื่อ-นามสกุล'); return; }
    if (!course)    { alert('กรุณาเลือกวิชา'); return; }

    // ── ชั้นที่ 1: บล็อก studentId ซ้ำ ──
    if (idBlocked) {
      msgDiv.innerHTML = '<span class="msg-error">❌ รหัสนักศึกษานี้มีในระบบแล้ว ไม่สามารถลงทะเบียนซ้ำได้</span>';
      return;
    }

    // ── ล็อกปุ่ม ──
    btnSave.disabled = true;
    btnSave.innerHTML = '<span class="spinner"></span> กำลังประมวลผล... <span class="count-badge">' + saveCounter + '/3</span>';
    msgDiv.innerHTML = '<span class="msg-info">⏳ กำลังตรวจจับใบหน้า...</span>';

    // ── ตรวจจับใบหน้า ──
    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if (!detection) {
      msgDiv.innerHTML = '<span class="msg-error">❌ ไม่พบใบหน้า กรุณามองกล้องให้ชัดเจน</span>';
      resetBtn();
      return;
    }

    const descriptorArray = Array.from(detection.descriptor);

    // ── ชั้นที่ 2: ตรวจใบหน้าซ้ำ (เฉพาะมุมแรก) ──
    if (saveCounter === 0) {
      msgDiv.innerHTML = '<span class="msg-info">⏳ กำลังตรวจสอบใบหน้าซ้ำ...</span>';
      try {
        const dup = await gasPost(API_URL, {
          action:         'checkDuplicate',
          faceDescriptor: descriptorArray,
          studentId:      studentId
        });
        if (dup.isDuplicate) {
          msgDiv.innerHTML =
            '<span class="msg-error">❌ ใบหน้านี้ตรงกับ <strong>' + dup.name + '</strong>' +
            (dup.studentId ? ' (รหัส ' + dup.studentId + ')' : '') +
            '<br>ไม่สามารถลงทะเบียนซ้ำได้</span>';
          resetBtn();
          return;
        }
      } catch(e) {
        // ถ้า API checkDuplicate ล้มเหลว ให้ผ่านได้ (fail-open) แต่แจ้งเตือน
        console.warn('checkDuplicate error:', e.message);
      }
    }

    // ── บันทึกจริง ──
    msgDiv.innerHTML = '<span class="msg-info">⏳ กำลังบันทึก...</span>';
    try {
      await gasPost(API_URL, {
        action:         'registerUser',
        studentId,
        name,
        course,
        faceDescriptor: descriptorArray
      });

      saveCounter++;
      updateDots();

      if (saveCounter >= 3) {
        msgDiv.innerHTML  = '<span class="msg-success">✅ ลงทะเบียนครบ 3 มุมแล้ว!</span>';
        btnSave.disabled  = true;
        btnSave.innerHTML = '✅ ลงทะเบียนครบแล้ว';
      } else {
        msgDiv.innerHTML  = '<span class="msg-success">✅ บันทึกมุมที่ ' + saveCounter + ' สำเร็จ — ขยับหน้าเล็กน้อยแล้วกดอีกครั้ง</span>';
        btnSave.disabled  = false;
        btnSave.innerHTML = '📸 บันทึกมุมที่ ' + (saveCounter + 1) + ' <span class="count-badge">' + saveCounter + '/3</span>';
      }
    } catch(e) {
      msgDiv.innerHTML = '<span class="msg-error">❌ บันทึกล้มเหลว: ' + e.message + '</span>';
      resetBtn();
    }
  }

  function resetBtn() {
    btnSave.disabled  = false;
    btnSave.innerHTML = '📸 บันทึกใบหน้า <span class="count-badge">' + saveCounter + '/3</span>';
  }
</script>
</body>
</html>
