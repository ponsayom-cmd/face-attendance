<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียน v6.2 (Lightweight)</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; --success: #10b981; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; flex-direction: column; align-items: center; }
    .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 380px; }
    input, select { width: 100%; padding: 10px; margin: 5px 0; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 14px; }
    .video-box { width: 100%; background: #000; border-radius: 12px; overflow: hidden; margin: 10px 0; position: relative; aspect-ratio: 4/3; }
    video { width: 100%; height: 100%; transform: scaleX(-1); }
    .btn { background: var(--p); color: white; border: none; padding: 14px; width: 100%; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 8px; font-size: 15px; }
    .btn-scan { background: #64748b; margin-bottom: 5px; }
    .btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    #status { font-size: 13px; text-align: center; margin: 10px 0; min-height: 1.5em; font-weight: bold; }
    .loading-overlay { position: fixed; inset: 0; background: #fff; z-index: 99; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  </style>
</head>
<body>

  <div id="loader" class="loading-overlay">
    <div style="border:3px solid #f3f3f3; border-top:3px solid var(--p); border-radius:50%; width:30px; height:30px; animation:spin 1s linear infinite"></div>
    <p>กำลังเปิดระบบ...</p>
  </div>

  <div class="card">
    <h3 style="margin:0; text-align:center;">ลงทะเบียนใบหน้า</h3>
    
    <input type="number" id="sid" placeholder="รหัสนักศึกษา">
    <input type="text" id="sname" placeholder="ชื่อ-นามสกุล">
    <select id="syear">
      <option value="">-- เลือกชั้นปี --</option>
      <option value="1">ปี 1</option>
      <option value="2">ปี 2</option>
      <option value="3">ปี 3</option>
      <option value="4">ปี 4</option>
    </select>

    <div class="video-box">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <div id="status">จัดตำแหน่งหน้าแล้วกดปุ่มด้านล่าง</div>

    <button id="btn-snap" class="btn btn-scan" onclick="captureFace()">1. สแกนใบหน้า</button>
    <button id="btn-save" class="btn" onclick="register()" disabled>2. บันทึกข้อมูล</button>
  </div>
  
  <a href="index.html" style="margin-top:15px; color:#94a3b8; font-size:14px; text-decoration:none;">กลับหน้าหลัก</a>

<script>
  const API = localStorage.getItem('gas_v5');
  const video = document.getElementById('video');
  const btnSnap = document.getElementById('btn-snap');
  const btnSave = document.getElementById('btn-save');
  const statusTxt = document.getElementById('status');
  let fullDesc = null;

  async function init() {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    try {
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      // ใช้ความละเอียดต่ำเพื่อให้เบาเครื่อง
      const stream = await navigator.mediaDevices.getUserMedia({ 
        video: { width: 320, height: 240, frameRate: { ideal: 15 } } 
      });
      video.srcObject = stream;
      document.getElementById('loader').style.display = 'none';
    } catch (e) {
      alert("เปิดกล้องไม่ได้: " + e.message);
    }
  }

  async function captureFace() {
    btnSnap.disabled = true;
    btnSnap.innerText = "กำลังประมวลผล...";
    statusTxt.innerText = "🔍 กำลังวิเคราะห์ใบหน้า...";
    
    // สแกนเพียงครั้งเดียวเมื่อกดปุ่ม
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions({ inputSize: 160, scoreThreshold: 0.4 }))
      .withFaceLandmarks()
      .withFaceDescriptor();

    if (detection) {
      fullDesc = Array.from(detection.descriptor);
      statusTxt.innerHTML = "<span style='color:green'>✅ สแกนสำเร็จ! พร้อมบันทึก</span>";
      btnSave.disabled = false;
    } else {
      statusTxt.innerHTML = "<span style='color:red'>❌ ไม่พบใบหน้า ลองใหม่อีกครั้ง</span>";
      fullDesc = null;
      btnSave.disabled = true;
    }
    btnSnap.disabled = false;
    btnSnap.innerText = "1. สแกนใบหน้าใหม่";
  }

  async function register() {
    const id = document.getElementById('sid').value.trim();
    const name = document.getElementById('sname').value.trim();
    const year = document.getElementById('syear').value;

    if (!id || !name || !year || !fullDesc) return alert("กรุณากรอกข้อมูลให้ครบ");

    btnSave.disabled = true;
    btnSave.innerText = "กำลังบันทึก...";

    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerUser', id, name, year, desc: fullDesc })
      });
      alert("ลงทะเบียนสำเร็จ!");
      window.location.href = "index.html";
    } catch (e) {
      alert("บันทึกสำเร็จ (โปรดเช็คในหน้าจัดการ)");
      window.location.href = "manage_students.html";
    }
  }

  window.onload = init;
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
