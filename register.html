<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษาใหม่ - Smart System</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #6366f1; --accent: #10b981; --bg: #0f172a; --card: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }

    .container { max-width: 500px; width: 100%; background: var(--card); padding: 30px; border-radius: 24px; border: 1px solid #334155; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .header { text-align: center; margin-bottom: 25px; }
    .header h2 { font-size: 24px; margin-bottom: 8px; }
    .header p { color: #94a3b8; font-size: 14px; }

    /* Progress Steps */
    .steps-container { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
    .step { width: 12px; height: 12px; border-radius: 50%; background: #334155; transition: 0.3s; }
    .step.active { background: var(--primary); box-shadow: 0 0 10px var(--primary); transform: scale(1.2); }
    .step.done { background: var(--accent); }

    /* Camera View */
    .camera-wrapper { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; position: relative; border: 2px solid #334155; margin-bottom: 20px; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .overlay-text { position: absolute; bottom: 20px; width: 100%; text-align: center; background: rgba(0,0,0,0.6); padding: 8px 0; font-size: 14px; color: #10b981; font-weight: bold; }

    /* Inputs */
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 8px; font-size: 14px; color: #94a3b8; }
    input { width: 100%; padding: 15px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; color: white; font-size: 16px; outline: none; }
    input:focus { border-color: var(--primary); }

    .btn { width: 100%; padding: 18px; border-radius: 15px; border: none; font-family: inherit; font-size: 18px; font-weight: bold; cursor: pointer; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 10px; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:disabled { background: #334155; color: #64748b; cursor: not-allowed; }
    
    .status-msg { text-align: center; margin-top: 15px; font-size: 14px; min-height: 20px; }
    .success { color: var(--accent); }
    .error { color: #ef4444; }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <h2>ลงทะเบียนสมาชิกใหม่</h2>
    <p>ถ่ายรูปใบหน้า 3 มุมมอง เพื่อความแม่นยำ</p>
  </div>

  <div class="steps-container">
    <div class="step" id="step1"></div>
    <div class="step" id="step2"></div>
    <div class="step" id="step3"></div>
  </div>

  <div class="camera-wrapper">
    <video id="video" autoplay muted playsinline></video>
    <div class="overlay-text" id="instruction">กรุณามองตรงไปที่กล้อง</div>
  </div>

  <div class="input-group">
    <label>ชื่อ-นามสกุล นักศึกษา</label>
    <input type="text" id="studentName" placeholder="เช่น นายสมชาย ใจดี">
  </div>

  <button class="btn btn-primary" id="btnCapture" disabled>
    📸 บันทึกใบหน้า (ครั้งที่ 1/3)
  </button>

  <div class="status-msg" id="status">⏳ กำลังเตรียมระบบ AI...</div>
  
  <p style="text-align:center; margin-top:20px;">
    <a href="index.html" style="color:#94a3b8; text-decoration:none; font-size: 14px;">← ยกเลิกและกลับหน้าหลัก</a>
  </p>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');
  const btn = document.getElementById('btnCapture');
  const status = document.getElementById('status');
  const instr = document.getElementById('instruction');
  const nameInput = document.getElementById('studentName');

  let currentStep = 1;
  const maxSteps = 3;
  const instructions = [
    "กรุณามองตรงไปที่กล้อง",
    "เอียงหน้าไปทางซ้ายเล็กน้อย",
    "เอียงหน้าไปทางขวาเล็กน้อย"
  ];

  async function init() {
    if (!API_URL) return alert('กรุณาตั้งค่า API URL ก่อนใช้งาน');

    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);

      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;

      video.onplay = () => {
        status.innerText = '✅ ระบบพร้อมทำงาน';
        btn.disabled = false;
        updateUI();
      };
    } catch (e) {
      status.innerText = '❌ ผิดพลาด: ' + e.message;
    }
  }

  function updateUI() {
    // อัปเดตจุดสถานะ
    for(let i=1; i<=3; i++) {
      const s = document.getElementById('step' + i);
      s.className = 'step';
      if (i < currentStep) s.classList.add('done');
      if (i === currentStep) s.classList.add('active');
    }

    instr.innerText = instructions[currentStep - 1];
    btn.innerHTML = `📸 บันทึกใบหน้า (ครั้งที่ ${currentStep}/3)`;
  }

  btn.onclick = async () => {
    const name = nameInput.value.trim();
    if (!name) return alert('กรุณากรอกชื่อก่อนเริ่มบันทึก');

    btn.disabled = true;
    status.innerText = '⏳ กำลังวิเคราะห์ใบหน้า...';

    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if (!detection) {
      alert('ไม่พบใบหน้า กรุณามองกล้องให้ชัดเจน');
      btn.disabled = false;
      status.innerText = '❌ ตรวจจับไม่สำเร็จ';
      return;
    }

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'registerUser',
          name: name,
          faceDescriptor: Array.from(detection.descriptor)
        })
      });
      const data = await res.json();

      if (data.success) {
        if (currentStep < maxSteps) {
          status.innerHTML = `<span class="success">✅ บันทึกรูปที่ ${currentStep} สำเร็จ!</span>`;
          currentStep++;
          setTimeout(() => {
            updateUI();
            btn.disabled = false;
            status.innerText = 'ทำต่อได้เลย...';
          }, 1500);
        } else {
          status.innerHTML = `<span class="success">🎉 ลงทะเบียนสำเร็จครบ 3 รูปแล้ว!</span>`;
          setTimeout(() => window.location.href = 'index.html', 2000);
        }
      }
    } catch (e) {
      alert('เกิดข้อผิดพลาดในการเชื่อมต่อ');
      btn.disabled = false;
    }
  };

  init();
</script>
</body>
</html>
