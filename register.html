<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนนักศึกษา</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; font-family: inherit; }
    .video-box { width: 100%; background: #000; border-radius: 15px; overflow: hidden; margin: 15px 0; position: relative; aspect-ratio: 4/3; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    .btn { background: var(--p); color: white; border: none; padding: 15px; width: 100%; border-radius: 12px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    .btn:disabled { background: #cbd5e1; }
    .back { margin-top: 15px; text-decoration: none; color: #94a3b8; font-size: 14px; }
    #status { font-size: 12px; color: #64748b; text-align: center; margin-top: 5px; }
  </style>
</head>
<body>

  <div class="card">
    <h3 style="margin-top:0">ลงทะเบียนใบหน้า 📸</h3>
    
    <input type="text" id="stu-id" placeholder="รหัสนักศึกษา">
    <input type="text" id="stu-name" placeholder="ชื่อ-นามสกุล">
    <select id="stu-year">
      <option value="">-- เลือกชั้นปี --</option>
      <option value="1">ปี 1</option>
      <option value="2">ปี 2</option>
      <option value="3">ปี 3</option>
      <option value="4">ปี 4</option>
      <option value="อื่นๆ">อื่นๆ</option>
    </select>

    <div class="video-box">
      <video id="video" autoplay muted playsinline></video>
    </div>
    <div id="status">กำลังเริ่มต้นกล้อง...</div>

    <button id="btn-reg" class="btn" onclick="register()" disabled>บันทึกข้อมูลและใบหน้า</button>
  </div>
  
  <a href="index.html" class="back">กลับหน้าหลัก</a>

<script>
  const API = localStorage.getItem('gas_v5');
  const video = document.getElementById('video');
  const btn = document.getElementById('btn-reg');
  const statusTxt = document.getElementById('status');
  let fullDesc = null;

  async function init() {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    try {
      await Promise.all([
        faceapi.nets.tinyFaceDetector.loadFromUri(MODEL_URL),
        faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL),
        faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL)
      ]);
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      statusTxt.innerText = "ระบบพร้อมตรวจจับใบหน้า";
      detect();
    } catch (e) {
      statusTxt.innerText = "ข้อผิดพลาด: " + e.message;
    }
  }

  async function detect() {
    const detection = await faceapi.detectSingleFace(video, new faceapi.TinyFaceDetectorOptions())
      .withFaceLandmarks().withFaceDescriptor();
    
    if (detection) {
      fullDesc = Array.from(detection.descriptor);
      btn.disabled = false;
      statusTxt.innerHTML = "<b style='color:green'>✅ ตรวจพบใบหน้าแล้ว</b>";
    } else {
      btn.disabled = true;
      statusTxt.innerText = "กรุณาวางใบหน้าให้ชัดเจน...";
    }
    setTimeout(detect, 500);
  }

  async function register() {
    const id = document.getElementById('stu-id').value.trim();
    const name = document.getElementById('stu-name').value.trim();
    const year = document.getElementById('stu-year').value;

    if (!id || !name || !year || !fullDesc) return alert("กรุณากรอกข้อมูลให้ครบและสแกนใบหน้า");

    btn.disabled = true;
    btn.innerText = "กำลังบันทึก...";

    try {
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerUser', id, name, year, desc: fullDesc })
      });
      alert("ลงทะเบียนสำเร็จ!");
      location.reload();
    } catch (e) {
      alert("บันทึกสำเร็จ (ระบบอาจมีการดีเลย์เล็กน้อย)");
      location.reload();
    }
  }

  window.onload = init;
</script>
</body>
</html>
