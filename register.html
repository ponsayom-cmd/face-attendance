<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ลงทะเบียนนักศึกษา v6.1</title>
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --p: #6366f1; --bg: #f8fafc; --success: #10b981; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    .card { background: white; padding: 25px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 450px; }
    input, select { width: 100%; padding: 12px; margin: 8px 0; border-radius: 12px; border: 1px solid #e2e8f0; box-sizing: border-box; font-family: inherit; outline: none; transition: 0.2s; }
    input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1); }
    .video-container { width: 100%; background: #000; border-radius: 18px; overflow: hidden; margin: 15px 0; position: relative; aspect-ratio: 4/3; }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    canvas { position: absolute; top: 0; left: 0; transform: scaleX(-1); }
    .btn { background: var(--p); color: white; border: none; padding: 16px; width: 100%; border-radius: 14px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; font-size: 16px; }
    .btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
    .btn:not(:disabled):hover { background: #4f46e5; transform: translateY(-2px); }
    .back { margin-top: 20px; text-decoration: none; color: #94a3b8; font-size: 14px; }
    #status { font-size: 13px; color: #64748b; text-align: center; margin-top: 10px; min-height: 20px; }
    .loader-overlay { position: fixed; inset: 0; background: rgba(255,255,255,0.9); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
  </style>
</head>
<body>

  <div id="setup-loader" class="loader-overlay">
    <div style="border: 4px solid #f3f3f3; border-top: 4px solid var(--p); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite;"></div>
    <p style="margin-top:15px; color: #64748b;">กำลังโหลด AI และกล้อง...</p>
  </div>

  <div class="card">
    <h3 style="margin:0 0 15px 0; text-align:center;">ลงทะเบียนนักศึกษาใหม่ 📸</h3>
    
    <input type="number" id="stu-id" placeholder="รหัสนักศึกษา (ตัวเลข)">
    <input type="text" id="stu-name" placeholder="ชื่อ-นามสกุล">
    <select id="stu-year">
      <option value="">-- เลือกชั้นปี --</option>
      <option value="1">ปี 1</option>
      <option value="2">ปี 2</option>
      <option value="3">ปี 3</option>
      <option value="4">ปี 4</option>
      <option value="อื่นๆ">อื่นๆ</option>
    </select>

    <div class="video-container" id="v-cont">
      <video id="video" autoplay muted playsinline></video>
      <canvas id="overlay"></canvas>
    </div>
    
    <div id="status">กำลังรอตรวจจับใบหน้า...</div>

    <button id="btn-reg" class="btn" onclick="register()" disabled>บันทึกข้อมูลใบหน้า</button>
  </div>
  
  <a href="index.html" class="back">← กลับหน้าหลัก</a>

<script>
  const API = localStorage.getItem('gas_v5');
  const video = document.getElementById('video');
  const canvas = document.getElementById('overlay');
  const btn = document.getElementById('btn-reg');
  const statusTxt = document.getElementById('status');
  let fullDesc = null;
  let isChecking = false;

  async function init() {
    const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
    try {
      // ใช้ SsdMobilenetv1 เพื่อความแม่นยำที่สูงกว่า
      await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);

      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 } });
      video.srcObject = stream;
      
      video.onloadedmetadata = () => {
        document.getElementById('setup-loader').style.display = 'none';
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        detect();
      };
    } catch (e) {
      alert("ไม่สามารถเปิดกล้องหรือโหลด AI ได้: " + e.message);
    }
  }

  async function detect() {
    if (isChecking) return;
    
    const detection = await faceapi.detectSingleFace(video, new faceapi.SsdMobilenetv1Options({ minConfidence: 0.5 }))
      .withFaceLandmarks()
      .withFaceDescriptor();
    
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (detection) {
      // วาดกรอบใบหน้าให้ผู้ใช้เห็น
      const dims = faceapi.matchDimensions(canvas, video, true);
      const resizedDetections = faceapi.resizeResults(detection, dims);
      faceapi.draw.drawDetections(canvas, resizedDetections);

      fullDesc = Array.from(detection.descriptor);
      btn.disabled = false;
      statusTxt.innerHTML = `<b style="color:var(--success)">✅ ตรวจพบใบหน้าแล้ว พร้อมบันทึก</b>`;
    } else {
      fullDesc = null;
      btn.disabled = true;
      statusTxt.innerText = "กรุณาขยับใบหน้าให้อยู่ในกรอบ...";
    }
    
    requestAnimationFrame(detect);
  }

  async function register() {
    const id = document.getElementById('stu-id').value.trim();
    const name = document.getElementById('stu-name').value.trim();
    const year = document.getElementById('stu-year').value;

    if (!id || !name || !year) {
      alert("กรุณากรอก รหัส, ชื่อ และเลือกชั้นปีให้ครบถ้วน");
      return;
    }

    if (!fullDesc) {
      alert("ยังไม่พบข้อมูลใบหน้า กรุณารอสักครู่");
      return;
    }

    isChecking = true;
    btn.disabled = true;
    btn.innerText = "กำลังเชื่อมต่อ Server...";

    try {
      const payload = { action: 'registerUser', id, name, year, desc: fullDesc };
      const res = await fetch(API, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      
      const result = await res.json();
      if(result.success) {
        alert("ลงทะเบียนคุณ " + name + " เรียบร้อยแล้ว!");
        window.location.href = "index.html";
      } else {
        alert("Server Error: " + result.message);
        btn.disabled = false;
        btn.innerText = "บันทึกข้อมูลใบหน้า";
      }
    } catch (e) {
      // กรณี CORS หรือเน็ตหลุดแต่ข้อมูลอาจจะเข้าแล้ว ให้ลองไปเช็คหน้าจัดการ
      alert("ส่งข้อมูลแล้ว โปรดตรวจสอบรายชื่อในหน้าจัดการนักศึกษา");
      window.location.href = "manage_students.html";
    } finally {
      isChecking = false;
    }
  }

  window.onload = init;
</script>
<style>
  @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
</style>
</body>
</html>
