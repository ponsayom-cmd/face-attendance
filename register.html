<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษา - Fast Registration</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #6366f1; --accent: #10b981; --bg: #0f172a; --card: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; }
    .container { max-width: 450px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.05); }
    
    h2 { text-align: center; margin-bottom: 20px; font-weight: 700; }
    .input-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; color: #94a3b8; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; color: white; font-size: 16px; outline: none; }
    input:focus { border-color: var(--primary); }

    .camera-wrapper { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #334155; margin: 15px 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .progress-bar { display: flex; justify-content: center; gap: 10px; margin-bottom: 15px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #334155; transition: 0.3s; }
    .dot.active { background: var(--primary); transform: scale(1.3); }
    .dot.done { background: var(--accent); }

    .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; }
    .btn-main { background: var(--primary); color: white; }
    .btn-main:active { transform: scale(0.98); }
    .btn-main:disabled { opacity: 0.5; cursor: not-allowed; }
    
    .instruction { color: var(--accent); font-weight: 600; font-size: 18px; margin-bottom: 10px; min-height: 27px; }
    .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 100; flex-direction: column; align-items: center; justify-content: center; }
    .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid var(--primary); border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin-bottom: 15px; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="container" id="formBox">
  <h2>ข้อมูลนักศึกษา</h2>
  <div class="input-group">
    <label>รหัสนักศึกษา</label>
    <input type="text" id="stdId" placeholder="6500000000">
  </div>
  <div class="input-group">
    <label>ชื่อ-นามสกุล</label>
    <input type="text" id="stdName" placeholder="สมชาย ใจดี">
  </div>
  <div class="input-group">
    <label>ชั้นปี</label>
    <select id="stdYear">
      <option value="1">ปี 1</option><option value="2">ปี 2</option>
      <option value="3">ปี 3</option><option value="4">ปี 4</option>
      <option value="อื่นๆ">อื่นๆ</option>
    </select>
  </div>
  <button class="btn btn-main" onclick="startFlow()">เริ่มสแกนใบหน้า</button>
</div>

<div class="container" id="scanBox" style="display:none; text-align: center;">
  <div class="instruction" id="instr">เตรียมพร้อม...</div>
  <div class="progress-bar">
    <div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div>
  </div>
  <div class="camera-wrapper">
    <video id="video" autoplay muted playsinline></video>
  </div>
  <button class="btn btn-main" id="capBtn" onclick="handleCapture()">📸 บันทึกท่าที่ 1</button>
</div>

<div class="loading-overlay" id="loader">
  <div class="spinner"></div>
  <p>กำลังบันทึกข้อมูลเข้าฐานข้อมูล...</p>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  let step = 1;
  let faceDescriptors = [];
  const video = document.getElementById('video');
  const texts = ["มองตรง", "เอียงซ้าย", "เอียงขวา"];

  async function startFlow() {
    if(!document.getElementById('stdId').value || !document.getElementById('stdName').value) return alert('กรุณากรอกข้อมูล');
    document.getElementById('formBox').style.display = 'none';
    document.getElementById('scanBox').style.display = 'block';
    
    document.getElementById('instr').innerText = '⏳ โหลด AI...';
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);
      const stream = await navigator.mediaDevices.getUserMedia({ video: { width: 400, height: 400 } });
      video.srcObject = stream;
      video.onplay = () => updateUI();
    } catch(e) { alert('กล้องไม่พร้อม'); }
  }

  function updateUI() {
    document.getElementById('instr').innerText = 'กรุณา' + texts[step-1];
    document.getElementById('capBtn').innerText = `📸 บันทึกท่าที่ ${step}`;
    for(let i=1; i<=3; i++) {
      const d = document.getElementById('d'+i);
      d.className = 'dot' + (i === step ? ' active' : (i < step ? ' done' : ''));
    }
  }

  async function handleCapture() {
    const btn = document.getElementById('capBtn');
    btn.disabled = true;
    document.getElementById('instr').innerText = '⌛ กำลังวิเคราะห์...';

    const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if(!detect) {
      alert('ไม่พบใบหน้า');
      btn.disabled = false;
      updateUI();
      return;
    }

    faceDescriptors.push(Array.from(detect.descriptor));
    
    if(step < 3) {
      step++;
      updateUI();
      btn.disabled = false;
    } else {
      finalize();
    }
  }

  async function finalize() {
    document.getElementById('loader').style.display = 'flex';
    const payload = {
      action: 'registerUserBatch',
      users: faceDescriptors.map(d => ({
        id: document.getElementById('stdId').value,
        name: document.getElementById('stdName').value,
        year: document.getElementById('stdYear').value,
        descriptor: d
      }))
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const data = await res.json();
      if(data.success) {
        alert('✅ บันทึกข้อมูลสำเร็จ!');
        window.location.href = 'index.html';
      } else {
        throw new Error(data.error);
      }
    } catch(e) {
      alert('บันทึกผิดพลาด: ' + e.message);
      document.getElementById('loader').style.display = 'none';
      document.getElementById('capBtn').disabled = false;
    }
  }
</script>
</body>
</html>
