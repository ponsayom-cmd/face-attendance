<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ลงทะเบียนนักเรียน</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --white:#fff; --off:#f7f8fa; --border:#e8eaed; --muted:#8f96a3; --text:#111318; --sub:#5a6270; --accent:#1a1a2e; --green:#16a34a; --red:#dc2626; --radius:18px; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Sarabun',sans-serif; background:var(--off); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding-bottom:40px; }
    .topbar { width:100%; background:var(--white); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; padding:calc(env(safe-area-inset-top,0px)+14px) 16px 14px; }
    .back-btn { width:36px; height:36px; border-radius:10px; background:var(--off); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--text); font-size:18px; flex-shrink:0; }
    .topbar-title { font-size:1rem; font-weight:600; }
    .topbar-sub { font-family:'IBM Plex Mono',monospace; font-size:0.65rem; color:var(--muted); margin-top:1px; }
    .page { width:100%; max-width:480px; padding:16px 16px 32px; display:flex; flex-direction:column; gap:14px; }

    /* progress steps */
    .steps { display:flex; align-items:center; gap:0; background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:14px 16px; }
    .step { flex:1; display:flex; flex-direction:column; align-items:center; gap:5px; }
    .step-circle { width:32px; height:32px; border-radius:50%; border:2px solid var(--border); display:flex; align-items:center; justify-content:center; font-size:.75rem; font-weight:700; color:var(--muted); background:var(--off); transition:all .3s; }
    .step-circle.done { background:var(--accent); border-color:var(--accent); color:var(--white); }
    .step-circle.active { border-color:var(--accent); color:var(--accent); background:var(--white); }
    .step-label { font-size:.65rem; color:var(--muted); font-weight:500; }
    .step-line { flex:1; height:1px; background:var(--border); max-width:24px; }
    .step-line.done { background:var(--accent); }

    /* status */
    .status-row { display:flex; align-items:center; gap:10px; background:var(--white); border:1px solid var(--border); border-radius:13px; padding:12px 14px; }
    .sdot { width:7px; height:7px; border-radius:50%; background:var(--muted); flex-shrink:0; }
    .sdot.ok  { background:var(--green); }
    .sdot.err { background:var(--red); }
    .sdot.pulse { animation:pulse 1.5s ease-in-out infinite; }
    .stext { font-size:.875rem; color:var(--sub); }

    /* video */
    .video-card { background:#0a0a14; border-radius:var(--radius); overflow:hidden; aspect-ratio:4/3; width:100%; position:relative; }
    video { width:100%; height:100%; object-fit:cover; transform:scaleX(-1); display:block; }

    /* form */
    .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 16px; display:flex; flex-direction:column; gap:12px; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field-label { font-size:.72rem; font-weight:600; color:var(--muted); letter-spacing:.07em; text-transform:uppercase; }
    input, select { padding:12px 13px; background:var(--off); border:1px solid var(--border); border-radius:11px; font-size:15px; font-family:'Sarabun',sans-serif; color:var(--text); outline:none; transition:border-color .2s,box-shadow .2s; appearance:none; }
    input::placeholder { color:var(--muted); }
    input:focus, select:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,26,46,.07); background:var(--white); }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .id-msg { font-size:.75rem; min-height:16px; transition:color .2s; }
    .select-wrap { position:relative; }
    .select-wrap::after { content:'›'; position:absolute; right:13px; top:50%; transform:translateY(-50%) rotate(90deg); color:var(--muted); pointer-events:none; font-size:16px; }
    .select-wrap select { width:100%; }

    /* button */
    .btn-save { width:100%; padding:15px; background:var(--accent); color:var(--white); border:none; border-radius:13px; font-size:1rem; font-weight:600; font-family:'Sarabun',sans-serif; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:10px; transition:opacity .2s; }
    .btn-save:disabled { opacity:.35; cursor:default; }
    .badge { background:rgba(255,255,255,.18); padding:2px 10px; border-radius:20px; font-size:.78rem; }
    .spinner { width:14px; height:14px; border:2px solid rgba(255,255,255,.3); border-top-color:var(--white); border-radius:50%; animation:spin .7s linear infinite; flex-shrink:0; }

    /* msg */
    .msg-box { min-height:20px; font-size:.875rem; font-weight:500; text-align:center; line-height:1.5; }
    .ok  { color:var(--green); }
    .err { color:var(--red); }
    .warn { color:#d97706; }
    .info { color:var(--muted); }

    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
    @keyframes spin  { to{transform:rotate(360deg)} }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="back-btn">‹</a>
    <div>
      <div class="topbar-title">ลงทะเบียนนักเรียน</div>
      <div class="topbar-sub">FACE REGISTRATION · 3 ANGLES</div>
    </div>
  </div>

  <div class="page">
    <!-- Steps -->
    <div class="steps">
      <div class="step">
        <div class="step-circle" id="dot1">1</div>
        <div class="step-label">หน้าตรง</div>
      </div>
      <div class="step-line" id="line1"></div>
      <div class="step">
        <div class="step-circle" id="dot2">2</div>
        <div class="step-label">หันซ้าย</div>
      </div>
      <div class="step-line" id="line2"></div>
      <div class="step">
        <div class="step-circle" id="dot3">3</div>
        <div class="step-label">หันขวา</div>
      </div>
    </div>

    <!-- Status -->
    <div class="status-row">
      <div class="sdot pulse" id="statusDot"></div>
      <div class="stext" id="status">กำลังโหลด AI Model...</div>
    </div>

    <!-- Video -->
    <div class="video-card">
      <video id="video" autoplay muted playsinline></video>
    </div>

    <!-- Form -->
    <div class="card">
      <div class="row2">
        <div class="field">
          <div class="field-label">รหัสนักศึกษา</div>
          <input type="text" id="studentId" placeholder="6501234567" oninput="onStudentIdInput(this.value)">
          <div class="id-msg info" id="idCheckMsg"></div>
        </div>
        <div class="field">
          <div class="field-label">ชื่อ-นามสกุล</div>
          <input type="text" id="username" placeholder="ชื่อ นามสกุล">
        </div>
      </div>
      <div class="field">
        <div class="field-label">วิชา / ชั้นเรียน</div>
        <div class="select-wrap">
          <select id="course">
            <option value="">— กำลังโหลดวิชา —</option>
          </select>
        </div>
      </div>
      <button class="btn-save" id="btnSave" onclick="saveFace()" disabled>
        <span>📸</span> <span id="btnLabel">บันทึกใบหน้า</span> <span class="badge" id="saveCount">0/3</span>
      </button>
      <div class="msg-box" id="msg"></div>
    </div>
  </div>

<script>
  if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
  async function gasGet(url){const r=await fetch(url,{redirect:'follow'});const t=await r.text();try{return JSON.parse(t);}catch(e){throw new Error(t.substring(0,100));}}
  async function gasPost(url,body){const r=await fetch(url,{method:'POST',headers:{'Content-Type':'text/plain;charset=utf-8'},body:JSON.stringify(body),redirect:'follow'});const t=await r.text();try{return JSON.parse(t);}catch(e){throw new Error(t.substring(0,100));}}
  const API_URL=localStorage.getItem('gasApiUrl')||(typeof GAS_API_URL!=='undefined'?GAS_API_URL:'');
  const video=document.getElementById('video'),btnSave=document.getElementById('btnSave'),msgDiv=document.getElementById('msg'),idCheckEl=document.getElementById('idCheckMsg');
  let saveCounter=0,idBlocked=false,idCheckTimer=null,modelReady=false;

  function setStatus(t,s='idle'){document.getElementById('status').innerText=t;const d=document.getElementById('statusDot');d.className='sdot'+(s==='ok'?' ok':s==='error'?' err':' pulse');}
  function updateDots(){
    [1,2,3].forEach(i=>{
      const c=document.getElementById('dot'+i);
      c.className='step-circle'+(i<saveCounter+1&&saveCounter>=i?i<=saveCounter?' done':' active':i===saveCounter+1?' active':'');
    });
    if(document.getElementById('line1'))document.getElementById('line1').className='step-line'+(saveCounter>=1?' done':'');
    if(document.getElementById('line2'))document.getElementById('line2').className='step-line'+(saveCounter>=2?' done':'');
  }

  if(!API_URL){setStatus('ยังไม่ได้ตั้งค่า API','error');}else{loadCourses();window.addEventListener('load',initModels);}

  async function loadCourses(){try{const courses=await gasGet(API_URL+'?action=getCourses');const sel=document.getElementById('course');sel.innerHTML='<option value="">— เลือกวิชา —</option>';courses.forEach(c=>{const o=document.createElement('option');o.value=o.textContent=c;sel.appendChild(o);});}catch(e){}}
  async function initModels(){try{const M='https://justadudewhohacks.github.io/face-api.js/models';await Promise.all([faceapi.nets.ssdMobilenetv1.loadFromUri(M),faceapi.nets.faceLandmark68Net.loadFromUri(M),faceapi.nets.faceRecognitionNet.loadFromUri(M)]);modelReady=true;startCamera();}catch(e){setStatus('โหลด AI ล้มเหลว','error');}}
  function startCamera(){navigator.mediaDevices.getUserMedia({video:{facingMode:'user'}}).then(stream=>{video.srcObject=stream;setStatus('พร้อมบันทึกใบหน้า','ok');btnSave.disabled=false;updateDots();}).catch(err=>{setStatus('เปิดกล้องไม่ได้','error');});}

  function onStudentIdInput(val){
    idBlocked=false;idCheckEl.className='id-msg info';idCheckEl.innerText='';clearTimeout(idCheckTimer);
    if(!val||val.length<4)return;
    idCheckTimer=setTimeout(async()=>{
      idCheckEl.innerText='⏳ ตรวจสอบรหัส...';
      try{const data=await gasGet(API_URL+'?action=checkStudentId&studentId='+encodeURIComponent(val));
        if(data.isDuplicate){idBlocked=true;idCheckEl.className='id-msg err';idCheckEl.innerText='❌ รหัสนี้ลงทะเบียนแล้ว ('+data.name+')';}
        else{idCheckEl.className='id-msg ok';idCheckEl.innerText='✓ รหัสนี้ยังไม่เคยลงทะเบียน';}
      }catch(e){idCheckEl.innerText='';}
    },600);
  }

  async function saveFace(){
    const studentId=document.getElementById('studentId').value.trim();
    const name=document.getElementById('username').value.trim();
    const course=document.getElementById('course').value;
    if(!studentId){alert('กรุณากรอกรหัสนักศึกษา');return;}
    if(!name){alert('กรุณากรอกชื่อ-นามสกุล');return;}
    if(!course){alert('กรุณาเลือกวิชา');return;}
    if(idBlocked){setMsg('❌ รหัสนักศึกษานี้มีในระบบแล้ว','err');return;}
    btnSave.disabled=true;
    document.getElementById('btnLabel').innerText='กำลังประมวลผล...';
    setMsg('⏳ กำลังตรวจจับใบหน้า...','info');
    const detection=await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if(!detection){setMsg('❌ ไม่พบใบหน้า กรุณามองกล้องให้ชัดเจน','err');resetBtn();return;}
    const descriptorArray=Array.from(detection.descriptor);
    if(saveCounter===0){
      setMsg('⏳ ตรวจสอบใบหน้าซ้ำ...','info');
      try{const dup=await gasPost(API_URL,{action:'checkDuplicate',faceDescriptor:descriptorArray,studentId});
        if(dup.isDuplicate){setMsg('❌ ใบหน้าตรงกับ '+dup.name+(dup.studentId?' (รหัส '+dup.studentId+')':''),'err');resetBtn();return;}
      }catch(e){console.warn(e);}
    }
    setMsg('⏳ กำลังบันทึก...','info');
    try{
      await gasPost(API_URL,{action:'registerUser',studentId,name,course,faceDescriptor:descriptorArray});
      saveCounter++;updateDots();document.getElementById('saveCount').innerText=saveCounter+'/3';
      if(saveCounter>=3){setMsg('✅ ลงทะเบียนครบ 3 มุมแล้ว!','ok');btnSave.disabled=true;document.getElementById('btnLabel').innerText='ลงทะเบียนครบแล้ว';}
      else{setMsg('✅ บันทึกมุมที่ '+saveCounter+' สำเร็จ — ขยับหน้าเล็กน้อยแล้วกดอีกครั้ง','ok');resetBtn();}
    }catch(e){setMsg('❌ บันทึกล้มเหลว: '+e.message,'err');resetBtn();}
  }
  function setMsg(t,c){msgDiv.className='msg-box '+(c||'info');msgDiv.innerText=t;}
  function resetBtn(){btnSave.disabled=false;document.getElementById('btnLabel').innerText='บันทึกใบหน้า';}
</script>
</body>
</html>
