<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียน - High Speed Fix</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #6366f1; --accent: #10b981; --bg: #0f172a; --card: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 15px; }
    .container { max-width: 450px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    .input-group { margin-bottom: 12px; }
    label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border-radius: 12px; background: #0f172a; border: 1px solid #334155; color: white; font-size: 16px; outline: none; }
    .camera-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; border: 2px solid #334155; margin: 15px 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 18px; cursor: pointer; transition: 0.2s; background: var(--primary); color: white; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .dot { width: 12px; height: 12px; border-radius: 50%; background: #334155; }
    .dot.active { background: var(--primary); transform: scale(1.2); }
    .dot.done { background: var(--accent); }
    .instr { color: var(--accent); font-weight: 600; text-align: center; margin-bottom: 10px; min-height: 24px; }
    #loader { display: none; margin-top: 15px; color: #94a3b8; font-size: 13px; text-align: center; }
  </style>
</head>
<body>

<div class="container" id="formUi">
  <h2 style="text-align:center; margin-bottom:20px;">ลงทะเบียนนักศึกษา</h2>
  <div class="input-group"><label>รหัสนักศึกษา</label><input type="text" id="sid"></div>
  <div class="input-group"><label>ชื่อ-นามสกุล</label><input type="text" id="sname"></div>
  <div class="input-group"><label>ชั้นปี</label>
    <select id="syear"><option value="1">ปี 1</option><option value="2">ปี 2</option><option value="3">ปี 3</option><option value="4">ปี 4</option></select>
  </div>
  <button class="btn" onclick="startScan()">เริ่มสแกนใบหน้า</button>
</div>

<div class="container" id="scanUi" style="display:none;">
  <div class="instr" id="instr">เตรียมพร้อม...</div>
  <div class="dots"><div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div></div>
  <div class="camera-box"><video id="video" autoplay muted playsinline></video></div>
  <button class="btn" id="btnCap" onclick="capture()">📸 บันทึกรูปที่ 1</button>
  <div id="loader">🚀 กำลังส่งข้อมูลเข้าระบบ...</div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  let step = 1;
  const video = document.getElementById('video');
  const texts = ["มองตรงหน้ากล้อง", "เอียงซ้ายเล็กน้อย", "เอียงขวาเล็กน้อย"];

  async function startScan() {
    if(!document.getElementById('sid').value || !document.getElementById('sname').value) return alert('กรุณากรอกข้อมูล');
    document.getElementById('formUi').style.display = 'none';
    document.getElementById('scanUi').style.display = 'block';
    
    await Promise.all([
      faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
      faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
      faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
    ]);
    const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
    video.srcObject = stream;
    video.onplay = () => updateUI();
  }

  function updateUI() {
    document.getElementById('instr').innerText = texts[step-1];
    document.getElementById('btnCap').innerText = `📸 บันทึกรูปที่ ${step}/3`;
    for(let i=1; i<=3; i++) document.getElementById('d'+i).className = 'dot' + (i===step ? ' active' : (i<step ? ' done' : ''));
  }

  async function capture() {
    const btn = document.getElementById('btnCap');
    const loader = document.getElementById('loader');
    btn.disabled = true;
    loader.style.display = 'block';

    const detect = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if(!detect) {
      alert('ไม่พบใบหน้า');
      btn.disabled = false;
      loader.style.display = 'none';
      return;
    }

    // --- Optimization: ลดขนาดข้อมูลทศนิยมเหลือ 4 ตำแหน่ง ---
    const smallDescriptor = Array.from(detect.descriptor).map(n => Math.round(n * 10000) / 10000);

    const payload = {
      action: 'registerUser',
      id: document.getElementById('sid').value,
      name: document.getElementById('sname').value,
      year: document.getElementById('syear').value,
      faceDescriptor: smallDescriptor
    };

    try {
      // ส่งข้อมูลทันทีที่ถ่ายเสร็จแต่ละรูป (Sequential Upload)
      const res = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const data = await res.json();
      
      if(data.success) {
        if(step < 3) {
          step++;
          updateUI();
          btn.disabled = false;
          loader.style.display = 'none';
        } else {
          alert('✅ ลงทะเบียนครบ 3 รูปสำเร็จ!');
          window.location.href = 'index.html';
        }
      }
    } catch(e) {
      alert('การเชื่อมต่อขัดข้อง');
      btn.disabled = false;
      loader.style.display = 'none';
    }
  }
</script>
</body>
</html>
