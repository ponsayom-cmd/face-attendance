<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>Register - High Precision</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    body { background: #0f172a; color: white; font-family: 'Sarabun', sans-serif; display: flex; justify-content: center; padding: 20px; }
    .card { width: 100%; max-width: 400px; background: #1e293b; padding: 25px; border-radius: 20px; }
    input { width: 100%; padding: 12px; margin-bottom: 10px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; }
    .cam-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 15px; overflow: hidden; position: relative; margin: 15px 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    .btn { width: 100%; padding: 15px; border-radius: 12px; border: none; background: #6366f1; color: white; font-weight: bold; cursor: pointer; }
    #msg { text-align: center; color: #10b981; font-weight: bold; }
  </style>
</head>
<body>
<div class="card">
  <h2 style="text-align:center">ลงทะเบียนใบหน้า</h2>
  <input type="text" id="sid" placeholder="รหัสนักศึกษา">
  <input type="text" id="sname" placeholder="ชื่อ-นามสกุล">
  <div class="cam-box"><video id="video" autoplay muted playsinline></video></div>
  <div id="msg">กรุณากรอกข้อมูลและเตรียมตัวสแกน</div>
  <button class="btn" onclick="startReg()">เริ่มบันทึกใบหน้า</button>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');

  async function init() {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
    video.srcObject = stream;
    await faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
    await faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
    await faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model');
  }

  async function startReg() {
    if(!sid.value || !sname.value) return alert('กรุณากรอกข้อมูล');
    document.getElementById('msg').innerText = "⌛ กำลังตรวจจับใบหน้า...";
    
    // สแกน 3 ครั้งเพื่อหาค่าเฉลี่ยที่แม่นยำที่สุด
    let descriptors = [];
    for(let i=0; i<3; i++) {
      document.getElementById('msg').innerText = `กำลังบันทึกภาพที่ ${i+1}/3...`;
      const det = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if(det) descriptors.push(det.descriptor);
      await new Promise(r => setTimeout(r, 800));
    }

    if(descriptors.length < 1) return alert('ไม่พบใบหน้า กรุณาลองใหม่');

    // หาค่าเฉลี่ย
    const avgDescriptor = new Float32Array(128);
    for(let i=0; i<128; i++) {
      let sum = 0;
      descriptors.forEach(d => sum += d[i]);
      avgDescriptor[i] = sum / descriptors.length;
    }

    document.getElementById('msg').innerText = "🚀 กำลังส่งข้อมูลคุณภาพสูง...";
    
    await fetch(API_URL, {
      method: 'POST',
      body: JSON.stringify({
        action: 'registerUser',
        id: sid.value,
        name: sname.value,
        desc: JSON.stringify(Array.from(avgDescriptor)) // ส่งค่าเต็ม ไม่ตัดทศนิยม
      })
    });

    alert('ลงทะเบียนสำเร็จ!');
    window.location.href = 'index.html';
  }
  init();
</script>
</body>
</html>
