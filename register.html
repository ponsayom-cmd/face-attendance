<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษา</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #6366f1; --bg: #0f172a; --card: #1e293b; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: #fff; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { max-width: 450px; width: 100%; background: var(--card); padding: 25px; border-radius: 20px; border: 1px solid #334155; }
    .video-box { width: 100%; aspect-ratio: 4/3; background: #000; border-radius: 15px; overflow: hidden; margin: 15px 0; border: 2px solid #475569; }
    video { width: 100%; height: 100%; object-fit: cover; }
    input { width: 100%; padding: 12px; border-radius: 10px; border: 1px solid #334155; background: #0f172a; color: white; margin-bottom: 15px; }
    .btn { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary); color: white; font-weight: bold; cursor: pointer; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .msg { margin-top: 15px; text-align: center; font-size: 14px; }
  </style>
</head>
<body>

<div class="container">
  <a href="index.html" style="color:#94a3b8; text-decoration:none; font-size:14px;">← กลับ</a>
  <h2 style="margin-top:10px;">ลงทะเบียนใบหน้า</h2>
  <div class="video-box"><video id="video" autoplay muted playsinline></video></div>
  <input type="text" id="nameInput" placeholder="กรอกชื่อ-นามสกุล">
  <div id="statusMsg" class="msg">⏳ กำลังเตรียมระบบ AI...</div>
  <button id="btnReg" class="btn" disabled>📸 สแกนและลงทะเบียน</button>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');
  const btn = document.getElementById('btnReg');
  const msg = document.getElementById('statusMsg');
  const nameInput = document.getElementById('nameInput');
  let knownFaces = [];

  async function init() {
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);

      if (API_URL) {
        const res = await fetch(`${API_URL}?action=getKnownFaces`);
        knownFaces = await res.json();
      }

      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      msg.innerText = '✅ ระบบพร้อมทำงาน';
      btn.disabled = false;
    } catch (e) {
      msg.innerHTML = `<span style="color:#ef4444">❌ โหลดระบบไม่สำเร็จ: ${e.message}</span>`;
    }
  }

  btn.onclick = async () => {
    const name = nameInput.value.trim();
    if (!name) return alert('กรุณาระบุชื่อ');
    
    btn.disabled = true;
    btn.innerText = '⏳ กำลังตรวจสอบใบหน้า...';

    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    if (!detection) {
      alert('ไม่พบใบหน้า กรุณามองกล้อง');
      btn.disabled = false; btn.innerText = '📸 สแกนและลงทะเบียน';
      return;
    }

    // 1. ตรวจสอบใบหน้าซ้ำ (Client-side)
    if (knownFaces.length > 0) {
      const descriptors = knownFaces.map(f => new faceapi.LabeledFaceDescriptors(f.name, [new Float32Array(f.descriptor)]));
      const matcher = new faceapi.FaceMatcher(descriptors, 0.5);
      const bestMatch = matcher.findBestMatch(detection.descriptor);
      if (bestMatch.label !== 'unknown') {
        msg.innerHTML = `<span style="color:#fbbf24">⚠️ พบใบหน้านี้ซ้ำในระบบ (ชื่อ: ${bestMatch.label})</span>`;
        btn.disabled = false; btn.innerText = '📸 สแกนและลงทะเบียน';
        return;
      }
    }

    // 2. ส่งบันทึก (Server-side)
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({ action: 'registerUser', name: name, faceDescriptor: Array.from(detection.descriptor) })
      });
      const result = await res.json();
      if (result.success) {
        msg.innerHTML = '<span style="color:#10b981">✅ ลงทะเบียนสำเร็จ!</span>';
        setTimeout(() => window.location.href='index.html', 1500);
      } else {
        msg.innerHTML = `<span style="color:#ef4444">❌ ${result.error}</span>`;
        btn.disabled = false; btn.innerText = '📸 สแกนและลงทะเบียน';
      }
    } catch (e) {
      alert('บันทึกไม่สำเร็จ ตรวจสอบอินเทอร์เน็ตหรือ API URL');
      btn.disabled = false;
    }
  };

  init();
</script>
</body>
</html>
