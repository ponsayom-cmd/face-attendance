<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>ลงทะเบียนนักศึกษา - Fast Multi-Angle</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.js"></script>
  <style>
    :root { --primary: #6366f1; --accent: #10b981; --bg: #0f172a; --card: #1e293b; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Sarabun', sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 20px; }
    .container { max-width: 500px; width: 100%; background: var(--card); padding: 25px; border-radius: 24px; border: 1px solid #334155; }
    
    .form-section { display: block; }
    .scan-section { display: none; text-align: center; }

    .input-group { margin-bottom: 15px; text-align: left; }
    label { display: block; margin-bottom: 5px; color: #94a3b8; font-size: 14px; }
    input, select { width: 100%; padding: 12px; border-radius: 10px; background: #0f172a; border: 1px solid #475569; color: white; font-size: 16px; }

    .camera-box { width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 20px; overflow: hidden; position: relative; border: 2px solid var(--primary); margin: 15px 0; }
    video { width: 100%; height: 100%; object-fit: cover; }
    
    .steps { display: flex; justify-content: center; gap: 8px; margin-bottom: 15px; }
    .step-dot { width: 10px; height: 10px; border-radius: 50%; background: #334155; }
    .step-dot.active { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
    .step-dot.done { background: var(--accent); }

    .btn { width: 100%; padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.3s; }
    .btn-primary { background: var(--primary); color: white; }
    .btn-success { background: var(--accent); color: white; }
    
    .instr { color: var(--accent); font-weight: bold; margin-bottom: 10px; }
    .status { font-size: 13px; color: #94a3b8; margin-top: 10px; }
  </style>
</head>
<body>

<div class="container">
  <!-- ส่วนที่ 1: กรอกข้อมูล -->
  <div id="formPart" class="form-section">
    <h2 style="margin-bottom: 20px; text-align: center;">ข้อมูลนักศึกษา</h2>
    <div class="input-group">
      <label>รหัสนักศึกษา</label>
      <input type="text" id="stdId" placeholder="เช่น 65XXXXXX">
    </div>
    <div class="input-group">
      <label>ชื่อ-นามสกุล</label>
      <input type="text" id="stdName" placeholder="เช่น นายสมชาย ใจดี">
    </div>
    <div class="input-group">
      <label>ชั้นปี</label>
      <select id="stdYear">
        <option value="1">ปี 1</option>
        <option value="2">ปี 2</option>
        <option value="3">ปี 3</option>
        <option value="4">ปี 4</option>
        <option value="อื่นๆ">อื่นๆ</option>
      </select>
    </div>
    <button class="btn btn-primary" onclick="startScanning()">เริ่มสแกนใบหน้า</button>
  </div>

  <!-- ส่วนที่ 2: สแกนใบหน้า -->
  <div id="scanPart" class="scan-section">
    <div class="instr" id="instr">เตรียมพร้อม...</div>
    <div class="steps" id="steps">
      <div class="step-dot" id="dot1"></div>
      <div class="step-dot" id="dot2"></div>
      <div class="step-dot" id="dot3"></div>
    </div>
    <div class="camera-box">
      <video id="video" autoplay muted playsinline></video>
    </div>
    <button class="btn btn-success" id="btnCap" onclick="captureFace()">📸 บันทึกท่าที่ 1</button>
    <div class="status" id="status">กำลังโหลด AI...</div>
  </div>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  let faceData = [];
  let step = 1;
  const video = document.getElementById('video');
  const instructions = ["มองตรงหน้ากล้อง", "เอียงซ้ายเล็กน้อย", "เอียงขวาเล็กน้อย"];

  async function startScanning() {
    const id = document.getElementById('stdId').value;
    const name = document.getElementById('stdName').value;
    if(!id || !name) return alert('กรุณากรอกข้อมูลให้ครบถ้วน');

    document.getElementById('formPart').style.display = 'none';
    document.getElementById('scanPart').style.display = 'block';
    
    initCamera();
  }

  async function initCamera() {
    try {
      await Promise.all([
        faceapi.nets.ssdMobilenetv1.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceLandmark68Net.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model'),
        faceapi.nets.faceRecognitionNet.loadFromUri('https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model')
      ]);
      const stream = await navigator.mediaDevices.getUserMedia({ video: {} });
      video.srcObject = stream;
      video.onplay = () => {
        updateStepUI();
        document.getElementById('status').innerText = 'AI พร้อมแล้ว';
      };
    } catch(e) { alert('โหลดกล้องไม่สำเร็จ'); }
  }

  function updateStepUI() {
    document.getElementById('instr').innerText = instructions[step-1];
    document.getElementById('btnCap').innerText = `📸 บันทึกท่าที่ ${step}`;
    for(let i=1; i<=3; i++) {
      const dot = document.getElementById('dot'+i);
      dot.className = 'step-dot' + (i === step ? ' active' : (i < step ? ' done' : ''));
    }
  }

  async function captureFace() {
    const btn = document.getElementById('btnCap');
    btn.disabled = true;
    document.getElementById('status').innerText = '⌛ วิเคราะห์ใบหน้า...';

    const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
    
    if(!detection) {
      alert('ไม่พบใบหน้า กรุณาปรับตำแหน่ง');
      btn.disabled = false;
      return;
    }

    // เก็บลง Memory ในเครื่องก่อน (ไม่ส่งไป Server ทันที)
    faceData.push(Array.from(detection.descriptor));
    
    if(step < 3) {
      step++;
      updateStepUI();
      btn.disabled = false;
      document.getElementById('status').innerText = 'บันทึกสำเร็จ! ต่อท่าถัดไป';
    } else {
      uploadAll();
    }
  }

  async function uploadAll() {
    document.getElementById('status').innerText = '🚀 กำลังส่งข้อมูลทั้งหมดไปที่ Server...';
    const id = document.getElementById('stdId').value;
    const name = document.getElementById('stdName').value;
    const year = document.getElementById('stdYear').value;

    const payload = {
      action: 'registerUserBatch',
      users: faceData.map(desc => ({
        id: id,
        name: name,
        year: year,
        descriptor: desc
      }))
    };

    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify(payload)
      });
      const result = await res.json();
      if(result.success) {
        alert('🎉 ลงทะเบียนสำเร็จเรียบร้อย!');
        window.location.href = 'index.html';
      }
    } catch(e) {
      alert('เกิดข้อผิดพลาดในการอัปโหลด');
      document.getElementById('btnCap').disabled = false;
    }
  }
</script>
</body>
</html>
