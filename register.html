<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>ลงทะเบียนนักศึกษา - Soft Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>
  <style>
    :root {
      --primary: #7c9cf8;
      --accent: #6ee7b7;
      --bg: #f8fafc;
      --card: #ffffff;
      --text-main: #334155;
      --text-sub: #64748b;
      --border: #f1f5f9;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Sarabun', sans-serif; }
    body { background-color: var(--bg); color: var(--text-main); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }

    .card { 
      background: var(--card); width: 100%; max-width: 400px; 
      border-radius: 30px; padding: 30px; border: 1px solid var(--border);
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05);
      text-align: center;
    }

    .header-section h2 { font-size: 22px; font-weight: 700; margin-bottom: 5px; }
    .header-section p { font-size: 14px; color: var(--text-sub); margin-bottom: 25px; }

    .cam-container {
      width: 100%; aspect-ratio: 1/1; background: #000; border-radius: 25px;
      overflow: hidden; position: relative; margin-bottom: 20px;
      border: 5px solid white; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1);
    }
    video { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
    
    .input-group { text-align: left; margin-bottom: 15px; }
    label { font-size: 13px; font-weight: 600; color: var(--text-sub); margin-left: 5px; display: block; margin-bottom: 5px; }
    input { 
      width: 100%; padding: 14px 18px; border-radius: 15px; 
      background: #fdfdfd; border: 1px solid var(--border); 
      color: var(--text-main); outline: none; transition: 0.3s; font-size: 15px;
    }
    input:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(124, 156, 248, 0.1); }

    .btn { 
      width: 100%; padding: 16px; border-radius: 18px; border: none; 
      font-weight: 700; font-size: 16px; cursor: pointer; transition: 0.3s;
      display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn-primary { 
      background: linear-gradient(135deg, var(--primary), #a5b4fc); 
      color: white; box-shadow: 0 8px 20px rgba(124, 156, 248, 0.3);
    }
    .btn-primary:disabled { background: #cbd5e1; box-shadow: none; cursor: not-allowed; }

    #status-msg { font-size: 13px; margin-top: 15px; font-weight: 600; min-height: 20px; transition: 0.3s; }
    .status-wait { color: var(--text-sub); }
    .status-ready { color: var(--accent); }
    .status-error { color: #ef4444; }

    .back-link { display: inline-block; margin-top: 20px; color: var(--text-sub); text-decoration: none; font-size: 14px; }
  </style>
</head>
<body>

<div class="card">
  <div class="header-section">
    <h2>ลงทะเบียนใบหน้า</h2>
    <p>ถ่ายรูปเพื่อบันทึกข้อมูลนักศึกษา</p>
  </div>

  <div class="cam-container">
    <video id="video" autoplay muted playsinline></video>
  </div>

  <div class="input-group">
    <label>รหัสนักศึกษา</label>
    <input type="text" id="studentId" placeholder="เช่น 65000001">
  </div>

  <div class="input-group">
    <label>ชื่อ-นามสกุล</label>
    <input type="text" id="studentName" placeholder="ระบุชื่อจริง">
  </div>

  <button id="regBtn" class="btn btn-primary" onclick="startCapture()" disabled>
    <i class="fas fa-camera"></i> บันทึกใบหน้า
  </button>

  <div id="status-msg" class="status-wait">กำลังโหลดระบบ AI...</div>

  <a href="index.html" class="back-link"><i class="fas fa-chevron-left"></i> กลับหน้าหลัก</a>
</div>

<script>
  const API_URL = localStorage.getItem('gasApiUrl');
  const video = document.getElementById('video');
  const regBtn = document.getElementById('regBtn');
  const statusMsg = document.getElementById('status-msg');

  async function initSystem() {
    try {
      const MODEL_URL = 'https://cdn.jsdelivr.net/npm/@vladmandic/face-api/model';
      // โหลดโมเดลมาตรฐานเพื่อความแม่นยำสูง
      await faceapi.nets.ssdMobilenetv1.loadFromUri(MODEL_URL);
      await faceapi.nets.faceLandmark68Net.loadFromUri(MODEL_URL);
      await faceapi.nets.faceRecognitionNet.loadFromUri(MODEL_URL);
      
      const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } });
      video.srcObject = stream;
      
      statusMsg.innerText = "✅ ระบบพร้อมลงทะเบียน";
      statusMsg.className = "status-ready";
      regBtn.disabled = false;
    } catch (err) {
      statusMsg.innerText = "❌ กล้องหรือระบบ AI มีปัญหา";
      statusMsg.className = "status-error";
      console.error(err);
    }
  }

  async function startCapture() {
    const sid = document.getElementById('studentId').value.trim();
    const sname = document.getElementById('studentName').value.trim();

    if (!sid || !sname) {
      alert("กรุณากรอกข้อมูลให้ครบถ้วน");
      return;
    }

    if (!API_URL) {
      alert("ไม่พบ URL ของระบบ กรุณากลับไปตั้งค่าที่หน้าหลัก");
      return;
    }

    regBtn.disabled = true;
    statusMsg.innerText = "⌛ กำลังตรวจจับใบหน้า (อย่าขยับ)...";
    statusMsg.className = "status-wait";

    let descriptors = [];
    // เก็บตัวอย่างใบหน้า 3 รอบเพื่อหาค่าเฉลี่ย
    for (let i = 0; i < 3; i++) {
      statusMsg.innerText = `⌛ บันทึกข้อมูลรอบที่ ${i+1}/3...`;
      const detection = await faceapi.detectSingleFace(video).withFaceLandmarks().withFaceDescriptor();
      if (detection) {
        descriptors.push(detection.descriptor);
      }
      await new Promise(r => setTimeout(r, 600));
    }

    if (descriptors.length === 0) {
      statusMsg.innerText = "❌ ตรวจไม่พบใบหน้า ลองใหม่อีกครั้ง";
      statusMsg.className = "status-error";
      regBtn.disabled = false;
      return;
    }

    // คำนวณค่าเฉลี่ย Descriptor
    const avgDescriptor = new Float32Array(128);
    for (let i = 0; i < 128; i++) {
      let sum = 0;
      descriptors.forEach(d => sum += d[i]);
      avgDescriptor[i] = sum / descriptors.length;
    }

    statusMsg.innerText = "🚀 กำลังบันทึกลงฐานข้อมูล...";
    
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        body: JSON.stringify({
          action: 'registerUser',
          id: sid,
          name: sname,
          desc: JSON.stringify(Array.from(avgDescriptor))
        })
      });
      
      const result = await response.json();
      if (result.success) {
        statusMsg.innerText = "✅ ลงทะเบียนสำเร็จ!";
        statusMsg.className = "status-ready";
        setTimeout(() => window.location.href = 'index.html', 1500);
      } else {
        throw new Error(result.error);
      }
    } catch (err) {
      statusMsg.innerText = "❌ บันทึกไม่สำเร็จ: " + err.message;
      statusMsg.className = "status-error";
      regBtn.disabled = false;
    }
  }

  window.onload = initSystem;
</script>
</body>
</html>
