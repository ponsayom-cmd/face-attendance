<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการข้อมูล v8.1</title>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #6366f1; --bg: #f8fafc; --err: #ef4444; }
        body { font-family: 'Sarabun', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border-radius: 10px; border: 1px solid #ddd; background: #fff; cursor: pointer; font-weight: bold; }
        .tab-btn.active { background: var(--p); color: white; border-color: var(--p); }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid #eee; color: #666; }
        td { padding: 12px; border-bottom: 1px solid #eee; }
        .btn-del { color: var(--err); border: none; background: #fee2e2; padding: 5px 10px; border-radius: 6px; cursor: pointer; }
        .btn-add { background: var(--p); color: white; border: none; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .input-group { display: flex; gap: 10px; margin-bottom: 15px; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 8px; }
        .loader { text-align: center; padding: 30px; color: #999; }
    </style>
</head>
<body>

<div class="container">
    <div class="tabs">
        <button id="tab-std" class="tab-btn active" onclick="switchTab('std')">👨‍🎓 จัดการนักศึกษา</button>
        <button id="tab-sub" class="tab-btn" onclick="switchTab('sub')">📚 จัดการรายวิชา</button>
        <button class="tab-btn" onclick="location.href='index.html'" style="margin-left:auto; background:#eee;">🏠 หน้าหลัก</button>
    </div>

    <!-- ส่วนจัดการนักศึกษา -->
    <div id="view-std" class="card">
        <h3>รายชื่อนักศึกษาที่ลงทะเบียน</h3>
        <div id="std-list">
            <div class="loader">กำลังโหลด...</div>
        </div>
    </div>

    <!-- ส่วนจัดการรายวิชา -->
    <div id="view-sub" class="card" style="display:none;">
        <h3>จัดการรายวิชา</h3>
        <div class="input-group">
            <input type="text" id="new-sub-input" placeholder="ระบุชื่อวิชาใหม่...">
            <button class="btn-add" onclick="addSubject()">เพิ่มวิชา</button>
        </div>
        <div id="sub-list">
            <div class="loader">กำลังโหลด...</div>
        </div>
    </div>
</div>

<script>
    const API = localStorage.getItem('gas_v5');
    let currentTab = 'std';

    function switchTab(tab) {
        currentTab = tab;
        document.getElementById('tab-std').classList.toggle('active', tab === 'std');
        document.getElementById('tab-sub').classList.toggle('active', tab === 'sub');
        document.getElementById('view-std').style.display = tab === 'std' ? 'block' : 'none';
        document.getElementById('view-sub').style.display = tab === 'sub' ? 'block' : 'none';
        loadData();
    }

    async function loadData() {
        const action = currentTab === 'std' ? 'getKnownFaces' : 'getSubjects';
        const listDiv = document.getElementById(currentTab === 'std' ? 'std-list' : 'sub-list');
        listDiv.innerHTML = '<div class="loader">กำลังเรียกข้อมูลจากระบบ...</div>';

        try {
            const res = await fetch(`${API}?action=${action}&t=${Date.now()}`);
            const data = await res.json();

            if (!Array.isArray(data)) {
                listDiv.innerHTML = `<p style="color:red; text-align:center;">API Error: ข้อมูลไม่ถูกต้อง</p>`;
                return;
            }

            if (data.length === 0) {
                listDiv.innerHTML = `<p style="text-align:center; color:#999;">ยังไม่มีข้อมูลในระบบ</p>`;
                return;
            }

            if (currentTab === 'std') {
                let html = '<table><tr><th>รหัส</th><th>ชื่อ</th><th>ปี</th><th>จัดการ</th></tr>';
                data.forEach(s => {
                    html += `<tr>
                        <td><b>${s.id}</b></td>
                        <td>${s.name}</td>
                        <td>ปี ${s.year}</td>
                        <td><button class="btn-del" onclick="deleteItem('deleteUser', '${s.name}')">ลบ</button></td>
                    </tr>`;
                });
                listDiv.innerHTML = html + '</table>';
            } else {
                let html = '<table><tr><th>ชื่อวิชา</th><th style="text-align:right;">จัดการ</th></tr>';
                data.forEach(sub => {
                    html += `<tr>
                        <td>${sub}</td>
                        <td style="text-align:right;"><button class="btn-del" onclick="deleteItem('deleteSubject', '${sub}')">ลบ</button></td>
                    </tr>`;
                });
                listDiv.innerHTML = html + '</table>';
            }
        } catch (e) {
            listDiv.innerHTML = `<p style="color:red; text-align:center;">ไม่สามารถติดต่อเซิร์ฟเวอร์ได้</p>`;
        }
    }

    async function addSubject() {
        const input = document.getElementById('new-sub-input');
        const name = input.value.trim();
        if (!name) return;
        
        try {
            const res = await fetch(API, {
                method: 'POST',
                body: JSON.stringify({ action: 'addSubject', subjectName: name })
            });
            input.value = '';
            loadData();
        } catch (e) { alert("เพิ่มไม่สำเร็จ"); }
    }

    async function deleteItem(action, value) {
        if (!confirm('ยืนยันการลบ?')) return;
        try {
            const body = action === 'deleteUser' ? { action, name: value } : { action, subjectName: value };
            await fetch(API, { method: 'POST', body: JSON.stringify(body) });
            loadData();
        } catch (e) { alert("ลบไม่สำเร็จ"); }
    }

    window.onload = loadData;
</script>
</body>
</html>
