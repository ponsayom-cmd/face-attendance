<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>สรุปรายงานการเข้าเรียน</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Sarabun', sans-serif; background: #f1f5f9; padding: 20px; }
    .container { max-width: 600px; margin: 0 auto; }
    .card { background: white; padding: 20px; border-radius: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 14px; }
    th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f1f5f9; }
    th { color: #64748b; }
    .chart-container { height: 250px; }
    .back { display: block; text-align: center; color: #666; text-decoration: none; margin-bottom: 20px; }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back">← กลับหน้าหลัก</a>
    <h2>รายงานสรุปผล 📊</h2>
    
    <div class="card">
      <div class="chart-container"><canvas id="attChart"></canvas></div>
    </div>

    <div class="card">
      <h3>ประวัติการเข้าเรียนล่าสุด</h3>
      <table id="log-table">
        <thead><tr><th>ชื่อ</th><th>วิชา</th><th>เวลา</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>

<script>
  const API = localStorage.getItem('gas_v5');
  
  window.onload = async () => {
    const res = await fetch(`${API}?action=getAttendance&t=${Date.now()}`);
    const data = await res.json();
    
    const tableBody = document.querySelector('#log-table tbody');
    const counts = {};
    
    data.forEach(r => {
      counts[r.subject] = (counts[r.subject] || 0) + 1;
      tableBody.innerHTML += `<tr><td>${r.name}</td><td>${r.subject}</td><td>${r.time}</td></tr>`;
    });

    renderChart(counts);
  };

  function renderChart(counts) {
    new Chart(document.getElementById('attChart'), {
      type: 'doughnut',
      data: {
        labels: Object.keys(counts),
        datasets: [{
          data: Object.values(counts),
          backgroundColor: ['#6366f1', '#10b981', '#f59e0b', '#ef4444']
        }]
      },
      options: { maintainAspectRatio: false }
    });
  }
</script>
</body>
</html>
