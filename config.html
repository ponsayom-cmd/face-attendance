<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>ตั้งค่าระบบ</title>
  <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --white:#fff; --off:#f7f8fa; --border:#e8eaed; --muted:#8f96a3; --text:#111318; --sub:#5a6270; --accent:#1a1a2e; --green:#16a34a; --red:#dc2626; --radius:18px; }
    * { box-sizing:border-box; margin:0; padding:0; -webkit-tap-highlight-color:transparent; }
    body { font-family:'Sarabun',sans-serif; background:var(--off); color:var(--text); min-height:100dvh; display:flex; flex-direction:column; align-items:center; padding-bottom:40px; }
    .topbar { width:100%; background:var(--white); border-bottom:1px solid var(--border); display:flex; align-items:center; gap:12px; padding:calc(env(safe-area-inset-top,0px)+14px) 16px 14px; }
    .back-btn { width:36px; height:36px; border-radius:10px; background:var(--off); border:1px solid var(--border); display:flex; align-items:center; justify-content:center; text-decoration:none; color:var(--text); font-size:18px; flex-shrink:0; }
    .topbar-title { font-size:1rem; font-weight:600; }
    .topbar-sub { font-family:'IBM Plex Mono',monospace; font-size:.65rem; color:var(--muted); margin-top:1px; }
    .page { width:100%; max-width:480px; padding:16px; display:flex; flex-direction:column; gap:14px; }
    .section-label { font-size:.72rem; font-weight:600; color:var(--muted); letter-spacing:.09em; text-transform:uppercase; padding:6px 2px 0; }
    .card { background:var(--white); border:1px solid var(--border); border-radius:var(--radius); padding:18px 16px; display:flex; flex-direction:column; gap:12px; }
    .field { display:flex; flex-direction:column; gap:5px; }
    .field-label { font-size:.72rem; font-weight:600; color:var(--muted); letter-spacing:.07em; text-transform:uppercase; }
    input { padding:12px 13px; background:var(--off); border:1px solid var(--border); border-radius:11px; font-size:15px; font-family:'Sarabun',sans-serif; color:var(--text); outline:none; appearance:none; transition:border-color .2s; width:100%; }
    input::placeholder { color:var(--muted); }
    input:focus { border-color:var(--accent); box-shadow:0 0 0 3px rgba(26,26,46,.07); background:var(--white); }
    .note { font-size:.75rem; color:var(--muted); line-height:1.5; }
    .row2 { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .btn { width:100%; padding:13px; border:none; border-radius:11px; font-size:.95rem; font-weight:600; font-family:'Sarabun',sans-serif; cursor:pointer; transition:opacity .2s; }
    .btn:active { opacity:.8; }
    .btn-primary { background:var(--accent); color:var(--white); }
    .btn-outline { background:transparent; color:var(--accent); border:1px solid var(--border); }
    .btn-green { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
    .btn-save { background:var(--accent); color:var(--white); padding:15px; font-size:1rem; margin-top:4px; }
    .course-list { display:flex; flex-direction:column; gap:8px; }
    .course-item { display:flex; align-items:center; justify-content:space-between; padding:10px 12px; background:var(--off); border:1px solid var(--border); border-radius:10px; font-size:.875rem; }
    .course-item span { color:var(--sub); }
    .msg { min-height:20px; font-size:.875rem; font-weight:500; text-align:center; }
    .ok  { color:var(--green); }
    .err { color:var(--red); }
    .info { color:var(--muted); }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="index.html" class="back-btn">‹</a>
    <div>
      <div class="topbar-title">ตั้งค่าระบบ</div>
      <div class="topbar-sub">API · GPS · COURSES</div>
    </div>
  </div>

  <div class="page">
    <div class="section-label">Google Apps Script</div>
    <div class="card">
      <div class="field">
        <div class="field-label">Web App URL</div>
        <input type="url" id="apiUrl" placeholder="https://script.google.com/macros/s/.../exec">
        <div class="note">Deploy GAS → Execute as: Me · Who has access: Anyone</div>
      </div>
    </div>

    <div class="section-label">จุดเช็คชื่อ GPS</div>
    <div class="card">
      <button class="btn btn-outline" onclick="getCurrentLocation()">📍 ดึงตำแหน่งปัจจุบัน</button>
      <div class="row2">
        <div class="field"><div class="field-label">Latitude</div><input type="number" step="any" id="lat" placeholder="13.7563"></div>
        <div class="field"><div class="field-label">Longitude</div><input type="number" step="any" id="lng" placeholder="100.5018"></div>
      </div>
      <div class="field">
        <div class="field-label">รัศมี (กิโลเมตร)</div>
        <input type="number" step="0.01" id="radius" placeholder="0.1 คือ 100 เมตร">
        <div class="note">ใส่ 0 เพื่อปิดการตรวจสอบตำแหน่ง</div>
      </div>
    </div>

    <div class="section-label">วิชาเรียน</div>
    <div class="card">
      <div class="field">
        <div class="field-label">เพิ่มวิชาใหม่</div>
        <input type="text" id="newCourse" placeholder="เช่น คณิตศาสตร์ ม.4/1">
      </div>
      <button class="btn btn-green" onclick="addCourse()">+ เพิ่มวิชา</button>
      <div class="course-list" id="courseList"></div>
    </div>

    <button class="btn btn-save" onclick="saveAll()">บันทึกการตั้งค่าทั้งหมด</button>
    <div class="msg" id="msg"></div>
  </div>

<script>
  const msgDiv=document.getElementById('msg');
  function setMsg(t,c){msgDiv.className='msg '+(c||'info');msgDiv.innerText=t;}
  window.onload=function(){
    const saved=localStorage.getItem('gasApiUrl')||(typeof GAS_API_URL!=='undefined'?GAS_API_URL:'');
    document.getElementById('apiUrl').value=saved;
    if(saved){loadGpsConfig(saved);loadCourseList(saved);}
  };
  function loadGpsConfig(url){fetch(url+'?action=getConfig').then(r=>r.json()).then(cfg=>{document.getElementById('lat').value=cfg.lat||'';document.getElementById('lng').value=cfg.lng||'';document.getElementById('radius').value=cfg.radius||'0';}).catch(()=>{});}
  function loadCourseList(url){fetch(url+'?action=getCourses').then(r=>r.json()).then(courses=>{const list=document.getElementById('courseList');list.innerHTML='';courses.forEach(c=>{const div=document.createElement('div');div.className='course-item';div.innerHTML='<span>'+c+'</span>';list.appendChild(div);});}).catch(()=>{});}
  function getCurrentLocation(){if(!navigator.geolocation)return alert('Browser ไม่รองรับ Geolocation');navigator.geolocation.getCurrentPosition(pos=>{document.getElementById('lat').value=pos.coords.latitude;document.getElementById('lng').value=pos.coords.longitude;setMsg('✓ ดึงพิกัดเรียบร้อย','ok');},err=>setMsg('ไม่สามารถดึงตำแหน่ง: '+err.message,'err'));}
  async function addCourse(){
    const url=document.getElementById('apiUrl').value.trim()||localStorage.getItem('gasApiUrl');
    const course=document.getElementById('newCourse').value.trim();
    if(!url)return setMsg('กรุณากรอก API URL ก่อน','err');
    if(!course)return setMsg('กรุณากรอกชื่อวิชา','err');
    try{const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'saveCourse',course})});const data=await r.json();setMsg('✓ '+(data.message||'เพิ่มวิชาเรียบร้อย'),'ok');document.getElementById('newCourse').value='';loadCourseList(url);}catch(e){setMsg('เพิ่มวิชาไม่ได้: '+e.message,'err');}
  }
  async function saveAll(){
    const url=document.getElementById('apiUrl').value.trim();
    const lat=document.getElementById('lat').value;
    const lng=document.getElementById('lng').value;
    const radius=document.getElementById('radius').value;
    if(!url)return setMsg('กรุณากรอก API URL','err');
    if(!lat||!lng||radius==='')return setMsg('กรุณากรอกข้อมูล GPS ให้ครบ','err');
    localStorage.setItem('gasApiUrl',url);
    setMsg('กำลังบันทึก...','info');
    try{const r=await fetch(url,{method:'POST',body:JSON.stringify({action:'saveConfig',lat,lng,radius})});const data=await r.json();setMsg('✓ '+(data.message||'บันทึกสำเร็จ'),'ok');}catch(e){setMsg('เชื่อมต่อ API ไม่ได้: '+e.message,'err');}
  }
</script>
</body>
</html>
